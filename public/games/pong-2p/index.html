<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pong 2 Players</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0d0b2a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      font-family: 'Segoe UI', sans-serif;
      overflow: hidden;
      color: #fff;
    }
    #gameCanvas {
      border: 3px solid rgba(255,255,255,0.15);
      border-radius: 12px;
      box-shadow: 0 0 60px rgba(99,102,241,0.4), 0 0 120px rgba(99,102,241,0.1);
    }
    #overlay {
      position: fixed; inset: 0;
      background: rgba(13,11,42,0.95);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      z-index: 10; gap: 14px;
    }
    #overlay h1 {
      font-size: 3.5rem; font-weight: 900;
      background: linear-gradient(135deg, #a78bfa, #60a5fa);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    #overlay p { color: rgba(255,255,255,0.65); font-size: 0.95rem; text-align: center; }
    .mode-btns { display: flex; gap: 16px; margin: 4px 0; }
    .mode-btn {
      background: rgba(255,255,255,0.06);
      border: 2px solid rgba(255,255,255,0.12);
      border-radius: 16px; padding: 18px 28px;
      cursor: pointer; text-align: center; transition: all 0.2s;
      min-width: 160px;
    }
    .mode-btn:hover { border-color: rgba(255,255,255,0.35); background: rgba(255,255,255,0.1); transform: translateY(-2px); }
    .mode-btn.selected { border-color: #818cf8; background: rgba(129,140,248,0.15); }
    .mode-btn .icon { font-size: 2rem; margin-bottom: 6px; }
    .mode-btn .label { font-weight: 700; font-size: 1rem; }
    .mode-btn .sub { font-size: 0.75rem; color: rgba(255,255,255,0.5); margin-top: 2px; }
    .diff-row { display: flex; gap: 10px; align-items: center; }
    .diff-row span { font-size: 0.85rem; color: rgba(255,255,255,0.5); }
    .diff-btn {
      border: 2px solid rgba(255,255,255,0.15);
      border-radius: 50px; padding: 5px 18px;
      background: transparent; color: #fff;
      cursor: pointer; font-size: 0.85rem; transition: all 0.15s;
    }
    .diff-btn.selected { border-color: #34d399; background: rgba(52,211,153,0.15); color: #34d399; font-weight: 700; }
    .controls-grid { display: flex; gap: 24px; }
    .player-box {
      background: rgba(255,255,255,0.05);
      border: 1.5px solid rgba(255,255,255,0.1);
      border-radius: 14px; padding: 12px 20px; text-align: center;
    }
    .player-box .name { font-size: 1rem; font-weight: 700; margin-bottom: 5px; }
    .player-box .keys { font-size: 0.8rem; color: rgba(255,255,255,0.55); }
    .key {
      display: inline-block; background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.18); border-radius: 5px;
      padding: 1px 7px; margin: 1px; font-family: monospace;
    }
    #startBtn {
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      color: #fff; border: none; border-radius: 50px;
      padding: 13px 44px; font-size: 1.05rem; font-weight: 700;
      cursor: pointer; transition: all 0.2s;
      box-shadow: 0 8px 32px rgba(99,102,241,0.4);
      margin-top: 4px;
    }
    #startBtn:hover { transform: translateY(-2px); box-shadow: 0 12px 40px rgba(99,102,241,0.5); }
    #score-display {
      position: fixed; top: 14px; left: 0; right: 0;
      display: flex; justify-content: center; gap: 60px;
      font-size: 2.5rem; font-weight: 900;
      pointer-events: none; z-index: 5;
    }
    .p1-score { color: #818cf8; }
    .p2-score { color: #34d399; }
    .divider { color: rgba(255,255,255,0.2); }
    #bot-label {
      position: fixed; top: 60px; right: 16px;
      font-size: 0.8rem; color: rgba(255,255,255,0.4);
      z-index: 5; pointer-events: none;
    }
  </style>

<style>/* global-responsive-fix */ canvas, #gameContainer { max-width: 100vw !important; max-height: 100vh !important; object-fit: contain !important; } body { overflow: hidden !important; touch-action: none; }</style>
</head>
<body>

<div id="score-display">
  <span class="p1-score" id="s1">0</span>
  <span class="divider">:</span>
  <span class="p2-score" id="s2">0</span>
</div>
<div id="bot-label"></div>
<canvas id="gameCanvas"></canvas>

<div id="overlay">
  <h1>🏓 PONG</h1>
  <p>ใครได้ 7 แต้มก่อนชนะ!</p>

  <!-- Mode selection -->
  <div class="mode-btns">
    <div class="mode-btn selected" id="btn-2p" onclick="selectMode('2p')">
      <div class="icon">👥</div>
      <div class="label">2 ผู้เล่น</div>
      <div class="sub">ใช้คีย์บอร์ดร่วมกัน</div>
    </div>
    <div class="mode-btn" id="btn-bot" onclick="selectMode('bot')">
      <div class="icon">🤖</div>
      <div class="label">เล่นกับบอท</div>
      <div class="sub">AI ฝ่ายขวา</div>
    </div>
  </div>

  <!-- Difficulty (shown only in bot mode) -->
  <div class="diff-row" id="diff-row" style="display:none">
    <span>ความยาก:</span>
    <button class="diff-btn selected" id="d-easy" onclick="selectDiff('easy')">😊 ง่าย</button>
    <button class="diff-btn" id="d-medium" onclick="selectDiff('medium')">🎯 ปานกลาง</button>
    <button class="diff-btn" id="d-hard" onclick="selectDiff('hard')">💀 ยาก</button>
  </div>

  <!-- Controls hint -->
  <div class="controls-grid" id="ctrl-grid">
    <div class="player-box">
      <div class="name" style="color:#818cf8">👤 ผู้เล่น 1 (ซ้าย)</div>
      <div class="keys">ขึ้น: <span class="key">W</span> &nbsp; ลง: <span class="key">S</span></div>
    </div>
    <div class="player-box" id="p2-box">
      <div class="name" style="color:#34d399">👤 ผู้เล่น 2 (ขวา)</div>
      <div class="keys">ขึ้น: <span class="key">↑</span> &nbsp; ลง: <span class="key">↓</span></div>
    </div>
  </div>

  <button id="startBtn">▶ เริ่มเกม</button>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const overlay = document.getElementById('overlay');
const startBtn = document.getElementById('startBtn');
const s1el = document.getElementById('s1');
const s2el = document.getElementById('s2');
const botLabel = document.getElementById('bot-label');

const W = 800, H = 500;
canvas.width = W; canvas.height = H;

const PADDLE_W = 14, PADDLE_H = 90, BALL_R = 8;
const WIN_SCORE = 7;

let gameMode = '2p'; // '2p' | 'bot'
let difficulty = 'easy'; // 'easy' | 'medium' | 'hard'
let score1 = 0, score2 = 0;
let gameRunning = false, animId;

let p1 = { y: H/2 - PADDLE_H/2 };
let p2 = { y: H/2 - PADDLE_H/2 };
let ball = { x: W/2, y: H/2, vx: 0, vy: 0 };

// Bot internals
let botTargetY = H/2;
let botReactionTimer = 0;

const keys = {};
window.addEventListener('keydown', e => {
  keys[e.key] = true;
  if (['ArrowUp','ArrowDown','w','s','W','S'].includes(e.key)) e.preventDefault();
});
window.addEventListener('keyup', e => { keys[e.key] = false; });

function selectMode(m) {
  gameMode = m;
  document.getElementById('btn-2p').classList.toggle('selected', m === '2p');
  document.getElementById('btn-bot').classList.toggle('selected', m === 'bot');
  document.getElementById('diff-row').style.display = m === 'bot' ? 'flex' : 'none';
  const p2box = document.getElementById('p2-box');
  p2box.innerHTML = m === 'bot'
    ? `<div class="name" style="color:#34d399">🤖 บอท (ขวา)</div><div class="keys">AI ${difficulty === 'easy' ? '😊 ง่าย' : difficulty === 'medium' ? '🎯 ปานกลาง' : '💀 ยาก'}</div>`
    : `<div class="name" style="color:#34d399">👤 ผู้เล่น 2 (ขวา)</div><div class="keys">ขึ้น: <span class="key">↑</span> &nbsp; ลง: <span class="key">↓</span></div>`;
}

function selectDiff(d) {
  difficulty = d;
  ['easy','medium','hard'].forEach(x => document.getElementById(`d-${x}`).classList.remove('selected'));
  document.getElementById(`d-${d}`).classList.add('selected');
  selectMode('bot'); // refresh p2 box label
}

function resetBall(dir) {
  ball.x = W/2; ball.y = H/2;
  const angle = (Math.random()*50 - 25) * Math.PI/180;
  const speed = 5.5;
  ball.vx = dir * speed * Math.cos(angle);
  ball.vy = speed * Math.sin(angle);
  botTargetY = H/2;
  botReactionTimer = 0;
}

function startGame() {
  score1 = 0; score2 = 0;
  s1el.textContent = '0'; s2el.textContent = '0';
  p1.y = H/2 - PADDLE_H/2;
  p2.y = H/2 - PADDLE_H/2;
  resetBall(1);
  overlay.style.display = 'none';
  if (gameMode === 'bot') {
    const labels = { easy: '😊 บอท: ง่าย', medium: '🎯 บอท: ปานกลาง', hard: '💀 บอท: ยาก' };
    botLabel.textContent = labels[difficulty];
  } else {
    botLabel.textContent = '';
  }
  gameRunning = true;
  if (animId) cancelAnimationFrame(animId);
  loop();
}

// ── BOT LOGIC ──
function predictBallY() {
  // Simulate ball path to right wall
  let bx = ball.x, by = ball.y, vx = ball.vx, vy = ball.vy;
  const p2x = W - 30 - PADDLE_W;
  let steps = 0;
  while (bx < p2x && steps < 600) {
    bx += vx; by += vy;
    if (by - BALL_R <= 0) { by = BALL_R; vy = Math.abs(vy); }
    if (by + BALL_R >= H) { by = H - BALL_R; vy = -Math.abs(vy); }
    steps++;
  }
  return by;
}

function updateBot() {
  const diffConfig = {
    easy:   { speed: 3.0, reactionDelay: 25, errorRange: 90 },
    medium: { speed: 4.5, reactionDelay: 12, errorRange: 40 },
    hard:   { speed: 6.5, reactionDelay: 3,  errorRange: 8  },
  };
  const cfg = diffConfig[difficulty];

  botReactionTimer++;
  if (botReactionTimer >= cfg.reactionDelay) {
    botReactionTimer = 0;
    if (ball.vx > 0) {
      const predicted = predictBallY();
      const error = (Math.random() - 0.5) * cfg.errorRange;
      botTargetY = predicted + error;
    } else {
      // Ball moving away — drift toward center lazily
      botTargetY = H/2 + (Math.random()-0.5) * 80;
    }
  }

  const center = p2.y + PADDLE_H/2;
  const diff = botTargetY - center;
  if (Math.abs(diff) > 3) {
    p2.y += Math.sign(diff) * Math.min(cfg.speed, Math.abs(diff));
  }
  p2.y = Math.max(0, Math.min(H - PADDLE_H, p2.y));
}

const PADDLE_SPEED = 7;

function update() {
  // Player 1
  if (keys['w'] || keys['W']) p1.y -= PADDLE_SPEED;
  if (keys['s'] || keys['S']) p1.y += PADDLE_SPEED;
  p1.y = Math.max(0, Math.min(H - PADDLE_H, p1.y));

  // Player 2 / Bot
  if (gameMode === 'bot') {
    updateBot();
  } else {
    if (keys['ArrowUp'])   p2.y -= PADDLE_SPEED;
    if (keys['ArrowDown']) p2.y += PADDLE_SPEED;
    p2.y = Math.max(0, Math.min(H - PADDLE_H, p2.y));
  }

  ball.x += ball.vx;
  ball.y += ball.vy;

  // Top/bottom
  if (ball.y - BALL_R <= 0) { ball.y = BALL_R; ball.vy = Math.abs(ball.vy); }
  if (ball.y + BALL_R >= H) { ball.y = H - BALL_R; ball.vy = -Math.abs(ball.vy); }

  // Left paddle
  const p1x = 30;
  if (ball.vx < 0 && ball.x - BALL_R <= p1x + PADDLE_W &&
      ball.x + BALL_R >= p1x &&
      ball.y >= p1.y - 4 && ball.y <= p1.y + PADDLE_H + 4) {
    ball.vx = Math.abs(ball.vx) * 1.04;
    const rel = (ball.y - (p1.y + PADDLE_H/2)) / (PADDLE_H/2);
    ball.vy = rel * 6;
    ball.x = p1x + PADDLE_W + BALL_R + 1;
  }

  // Right paddle
  const p2x = W - 30 - PADDLE_W;
  if (ball.vx > 0 && ball.x + BALL_R >= p2x &&
      ball.x - BALL_R <= p2x + PADDLE_W &&
      ball.y >= p2.y - 4 && ball.y <= p2.y + PADDLE_H + 4) {
    ball.vx = -Math.abs(ball.vx) * 1.04;
    const rel = (ball.y - (p2.y + PADDLE_H/2)) / (PADDLE_H/2);
    ball.vy = rel * 6;
    ball.x = p2x - BALL_R - 1;
  }

  // Speed cap
  const spd = Math.hypot(ball.vx, ball.vy);
  if (spd > 20) { ball.vx = ball.vx/spd*20; ball.vy = ball.vy/spd*20; }

  // Scoring
  if (ball.x < 0) {
    score2++; s2el.textContent = score2;
    if (score2 >= WIN_SCORE) { showResult(2); return; }
    resetBall(-1);
  }
  if (ball.x > W) {
    score1++; s1el.textContent = score1;
    if (score1 >= WIN_SCORE) { showResult(1); return; }
    resetBall(1);
  }
}

function drawRR(x, y, w, h, r, color) {
  ctx.fillStyle = color;
  ctx.beginPath(); ctx.roundRect(x, y, w, h, r); ctx.fill();
}

function draw() {
  ctx.fillStyle = '#0d0b2a';
  ctx.fillRect(0, 0, W, H);

  // Center line
  ctx.setLineDash([12, 10]);
  ctx.strokeStyle = 'rgba(255,255,255,0.07)';
  ctx.lineWidth = 3;
  ctx.beginPath(); ctx.moveTo(W/2, 0); ctx.lineTo(W/2, H); ctx.stroke();
  ctx.setLineDash([]);

  ctx.shadowBlur = 22;

  // P1 paddle
  ctx.shadowColor = '#818cf8';
  drawRR(30, p1.y, PADDLE_W, PADDLE_H, 7, '#818cf8');

  // P2 / Bot paddle
  const p2Color = gameMode === 'bot' ? '#f472b6' : '#34d399';
  ctx.shadowColor = p2Color;
  drawRR(W - 30 - PADDLE_W, p2.y, PADDLE_W, PADDLE_H, 7, p2Color);

  // Ball
  ctx.shadowColor = '#fff';
  ctx.shadowBlur = 26;
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(ball.x, ball.y, BALL_R, 0, Math.PI*2); ctx.fill();

  ctx.shadowBlur = 0;
}

function loop() {
  if (!gameRunning) return;
  update(); draw();
  animId = requestAnimationFrame(loop);
}

function showResult(winner) {
  gameRunning = false;
  const isBot = gameMode === 'bot';
  const w1name = 'ผู้เล่น 1';
  const w2name = isBot ? 'บอท 🤖' : 'ผู้เล่น 2';
  const name = winner === 1 ? w1name : w2name;
  overlay.style.display = 'flex';
  overlay.innerHTML = `
    <h1 style="font-size:2.8rem">🎉 ${name} ชนะ!</h1>
    <p style="font-size:1.3rem;color:rgba(255,255,255,0.75)">${score1} : ${score2}</p>
    <button onclick="location.reload()"
      style="background:linear-gradient(135deg,#6366f1,#8b5cf6);color:#fff;border:none;border-radius:50px;padding:13px 44px;font-size:1.05rem;font-weight:700;cursor:pointer;margin-top:8px;">
      🔄 เล่นอีกครั้ง
    </button>
  `;
  window.parent?.postMessage({ type: 'GAME_OVER', score: Math.max(score1, score2) }, '*');
}

startBtn.addEventListener('click', startGame);
</script>
</body>
</html>
