<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tower Stack Game</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #1e1e2f;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      height: 100vh; overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      color: #fff;
    }
    #gameContainer {
      position: relative; width: 100%; max-width: 400px; height: 100vh; max-height: 800px;
    }
    canvas {
      display: block; width: 100%; height: 100%; background: linear-gradient(to top, #2b2b45, #1e1e2f);
    }
    #ui {
      position: absolute; top: 0; left: 0; right: 0; bottom: 0; pointer-events: none;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      background: rgba(30, 30, 47, 0.85); z-index: 10;
    }
    h1 { font-size: 3rem; margin-bottom: 10px; color: #ff5e62; text-shadow: 0 4px 10px rgba(255,94,98,0.5); }
    p { font-size: 1.1rem; margin-bottom: 25px; color: #ccc; }
    button {
      pointer-events: auto; background: linear-gradient(135deg, #ff9966, #ff5e62);
      color: #fff; border: none; padding: 15px 40px; font-size: 1.2rem; font-weight: bold;
      border-radius: 50px; cursor: pointer; transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 8px 20px rgba(255,94,98,0.4);
    }
    button:hover { transform: translateY(-3px); box-shadow: 0 12px 25px rgba(255,94,98,0.6); }
    #scoreDisplay {
      position: absolute; top: 30px; left: 0; right: 0; text-align: center;
      font-size: 4rem; font-weight: 900; color: rgba(255,255,255,0.2); z-index: 5; pointer-events: none;
    }
  </style>

<style>/* global-responsive-fix */ canvas, #gameContainer { max-width: 100vw !important; max-height: 100vh !important; object-fit: contain !important; } body { overflow: hidden !important; touch-action: none; }</style>
</head>
<body>

<div id="gameContainer">
  <div id="scoreDisplay">0</div>
  <canvas id="gameCanvas" width="400" height="800"></canvas>
  <div id="ui">
    <h1>TOWER STACK</h1>
    <p>แตะเพื่อวางบล็อกซ้อนกันให้สูงที่สุด</p>
    <button id="startBtn">เริ่มเกม</button>
  </div>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const ui = document.getElementById('ui');
const startBtn = document.getElementById('startBtn');
const scoreDisplay = document.getElementById('scoreDisplay');

const W = canvas.width;
const H = canvas.height;
const INITIAL_BOX_WIDTH = 200;
const BOX_HEIGHT = 40;

let state = 'menu'; // menu, playing, gameover
let score = 0;
let boxes = [];
let currentBox = null;
let cameraY = 0;
let direction = 1;
let speed = 4;
let hue = 0;

function initGame() {
  score = 0;
  scoreDisplay.textContent = score;
  cameraY = 0;
  hue = Math.random() * 360;
  speed = 4;
  boxes = [
    { x: W/2 - INITIAL_BOX_WIDTH/2, y: H - BOX_HEIGHT, width: INITIAL_BOX_WIDTH, color: `hsl(${hue}, 70%, 50%)` }
  ];
  spawnBox();
  state = 'playing';
}

function spawnBox() {
  const lastBox = boxes[boxes.length - 1];
  let startX = direction === 1 ? -lastBox.width : W;
  hue = (hue + 10) % 360;
  currentBox = {
    x: startX,
    y: lastBox.y - BOX_HEIGHT,
    width: lastBox.width,
    color: `hsl(${hue}, 70%, 60%)`
  };
}

function update() {
  if (state !== 'playing') return;

  // Move current box
  currentBox.x += speed * direction;
  
  if (currentBox.x > W || currentBox.x + currentBox.width < 0) {
    // Reverse direction if hitting bounds to make it bounce, or just wrap around?
    // standard stack game bounces:
    if (currentBox.x > W - currentBox.width) {
      currentBox.x = W - currentBox.width;
      direction = -1;
    } else if (currentBox.x < 0) {
      currentBox.x = 0;
      direction = 1;
    }
  }

  // Smooth camera move
  const targetCameraY = boxes[boxes.length - 1].y - (H - BOX_HEIGHT * 6);
  if (targetCameraY < cameraY) {
    cameraY += (targetCameraY - cameraY) * 0.1;
  }
}

function drawBox(box) {
  ctx.fillStyle = box.color;
  ctx.fillRect(box.x, box.y - cameraY, box.width, BOX_HEIGHT);
  // Add 3D effect / highlight
  ctx.fillStyle = 'rgba(255,255,255,0.2)';
  ctx.fillRect(box.x, box.y - cameraY, box.width, 5);
  ctx.fillStyle = 'rgba(0,0,0,0.2)';
  ctx.fillRect(box.x, box.y - cameraY + BOX_HEIGHT - 5, box.width, 5);
}

function draw() {
  ctx.clearRect(0, 0, W, H);
  
  // Draw placed boxes
  for (let b of boxes) drawBox(b);

  // Draw moving box
  if (currentBox && state === 'playing') {
    drawBox(currentBox);
  }
}

function handleTap(e) {
  if(e) e.preventDefault();
  if (state !== 'playing') return;

  const lastBox = boxes[boxes.length - 1];
  
  // Calculate overlap
  const overlap = currentBox.x < lastBox.x 
    ? (currentBox.x + currentBox.width) - lastBox.x
    : (lastBox.x + lastBox.width) - currentBox.x;

  if (overlap <= 0) {
    // Missed completely
    state = 'gameover';
    showGameOver();
    return;
  }

  // Cut box
  const perfectThreshold = 5;
  if (Math.abs(currentBox.x - lastBox.x) <= perfectThreshold) {
    // Perfect match
    currentBox.x = lastBox.x;
    currentBox.width = lastBox.width;
    // Maybe make it flash or increase size? (omitted for simplicity)
  } else {
    currentBox.width = overlap;
    currentBox.x = currentBox.x < lastBox.x ? lastBox.x : currentBox.x;
  }

  boxes.push({...currentBox});
  score++;
  scoreDisplay.textContent = score;
  
  speed += 0.15; // Increase difficulty
  direction = Math.random() > 0.5 ? 1 : -1;
  spawnBox();
}

function showGameOver() {
  ui.style.display = 'flex';
  ui.innerHTML = `
    <h1>GAME OVER</h1>
    <p>คุณสร้างตึกได้: <strong style="color:#ff5e62; font-size:1.5rem">${score}</strong> ชั้น</p>
    <button id="restartBtn">เล่นอีกครั้ง</button>
  `;
  document.getElementById('restartBtn').addEventListener('click', () => {
    ui.style.display = 'none';
    initGame();
  });
  window.parent?.postMessage({ type: 'GAME_OVER', score: score }, '*');
}

startBtn.addEventListener('click', () => {
  ui.style.display = 'none';
  initGame();
});

// Event listeners for dropping
window.addEventListener('mousedown', handleTap);
window.addEventListener('keydown', (e) => { if(e.code === 'Space') handleTap(); });
window.addEventListener('touchstart', handleTap, {passive: false});

function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}

// Start loop
loop();

</script>
</body>
</html>
