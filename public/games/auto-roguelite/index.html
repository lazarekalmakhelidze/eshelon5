<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Auto Roguelite (Idle Adventure)</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #1a1a2e; color: #fff; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
    #gameWrapper { width: 800px; height: 600px; background: #16213e; border: 4px solid #0f3460; border-radius: 12px; display: flex; flex-direction: column; box-shadow: 0 10px 30px rgba(0,0,0,0.8); position: relative; }
    
    /* Header Stats */
    #header { padding: 15px 20px; background: #0f3460; display: flex; justify-content: space-between; border-bottom: 2px solid #e94560; font-size: 1.2rem; font-weight: bold; }
    .stat { color: #fff; }
    .stat span { color: #e94560; font-size: 1.4rem; }
    .stat-gold span { color: #f1c40f; }
    
    /* Main Content */
    #mainContent { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; text-align: center; }
    
    /* Battle View */
    #battleView { display: none; width: 100%; flex-direction: column; align-items: center; justify-content: center; }
    .combatants { display: flex; justify-content: space-around; width: 100%; margin-bottom: 30px; }
    .fighter { display: flex; flex-direction: column; align-items: center; width: 250px; }
    .fighter-name { font-size: 1.5rem; font-weight: bold; margin-bottom: 10px; }
    .sprite { width: 100px; height: 100px; background: #e94560; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 3rem; margin-bottom: 15px; box-shadow: 0 0 20px rgba(233,69,96,0.5); transition: 0.1s; }
    .sprite.enemy { background: #4caf50; box-shadow: 0 0 20px rgba(76,175,80,0.5); }
    .bar-bg { width: 100%; height: 25px; background: #333; border-radius: 12px; border: 2px solid #000; overflow: hidden; margin-bottom: 5px; position: relative; }
    .bar { height: 100%; transition: width 0.3s ease-out; }
    .hp-bar { background: #e74c3c; width: 100%; }
    .bar-text { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 0.9rem; font-weight: bold; text-shadow: 1px 1px 2px #000; }
    
    #battleLog { width: 80%; height: 120px; background: rgba(0,0,0,0.5); border: 1px solid #444; border-radius: 8px; padding: 10px; overflow-y: auto; font-size: 1rem; color: #ccc; margin-top: 20px; text-align: left; }

    /* Event View (Choices) */
    #eventView { display: flex; flex-direction: column; align-items: center; justify-content: center; width: 100%; }
    #eventTitle { font-size: 2rem; color: #e94560; margin-bottom: 15px; }
    #eventDesc { font-size: 1.2rem; margin-bottom: 40px; color: #ccc; }
    .choices { display: flex; gap: 20px; width: 100%; justify-content: center; }
    .choice-card { flex: 1; max-width: 200px; background: #0f3460; border: 2px solid #e94560; border-radius: 10px; padding: 20px; cursor: pointer; transition: 0.2s; display: flex; flex-direction: column; align-items: center; }
    .choice-card:hover { transform: translateY(-5px); background: #e94560; }
    .choice-card .icon { font-size: 3rem; margin-bottom: 10px; }
    .choice-card .title { font-weight: bold; font-size: 1.2rem; margin-bottom: 5px; }
    
    /* Shop / Upgrade View */
    #shopView { display: none; width: 100%; flex-direction: column; align-items: center; }
    .shop-items { display: flex; gap: 20px; margin-bottom: 30px; }
    
    /* Game Over Overlay */
    #gameOverView { display: none; position: absolute; inset: 0; background: rgba(0,0,0,0.9); flex-direction: column; align-items: center; justify-content: center; z-index: 50; }
    #gameOverView h1 { font-size: 4rem; color: #e74c3c; margin-bottom: 10px; }
    
    button { background: #e94560; color: #fff; border: none; padding: 12px 30px; font-size: 1.2rem; font-weight: bold; border-radius: 8px; cursor: pointer; transition: 0.2s; }
    button:hover { background: #ff4757; }
    button:disabled { background: #555; cursor: not-allowed; }

    .hit-anim { transform: scale(1.2) rotate(5deg); background: #fff !important; }
  </style>

<style>/* global-responsive-fix */ canvas, #gameContainer { max-width: 100vw !important; max-height: 100vh !important; object-fit: contain !important; } body { overflow: hidden !important; touch-action: none; }</style>
</head>
<body>

<div id="gameWrapper">
  <div id="header">
    <div class="stat">ด่านที่: <span id="stageVal">1</span></div>
    <div class="stat">HP: <span id="pMaxHpVal">100</span> (ATK: <span id="pAtkVal">10</span>)</div>
    <div class="stat stat-gold">ทอง: <span id="goldVal">0</span> 💰</div>
  </div>

  <div id="mainContent">
    <!-- View 1: Event/Choices -->
    <div id="eventView">
      <h2 id="eventTitle">ถึงทางแยก...</h2>
      <p id="eventDesc">คุณจะเลือกเส้นทางไหนดี?</p>
      <div class="choices" id="choicesContainer">
        <!-- Cards injected here -->
      </div>
    </div>

    <!-- View 2: Auto Battle -->
    <div id="battleView">
      <div class="combatants">
        <div class="fighter">
          <div class="fighter-name">นักรบ (คุณ)</div>
          <div class="sprite" id="pSprite">🤺</div>
          <div class="bar-bg">
            <div class="bar hp-bar" id="pHpBar"></div>
            <div class="bar-text" id="pHpText">100 / 100</div>
          </div>
        </div>
        <div style="font-size: 3rem; font-weight: 900; color: #e94560; display: flex; align-items: center;">VS</div>
        <div class="fighter">
          <div class="fighter-name" id="eName">ศัตรู</div>
          <div class="sprite enemy" id="eSprite">👾</div>
          <div class="bar-bg">
            <div class="bar hp-bar" id="eHpBar"></div>
            <div class="bar-text" id="eHpText">50 / 50</div>
          </div>
        </div>
      </div>
      <div id="battleLog"></div>
      <button id="btnContinue" style="display:none; margin-top:15px;">เดินทางต่อ</button>
    </div>

    <!-- View 3: Shop/Campfire -->
    <div id="shopView">
      <h2 id="eventTitle" style="color:#f1c40f; margin-bottom: 20px; font-size: 2.5rem;">แคมป์พักแรม 🏕️</h2>
      <div class="shop-items">
        <div class="choice-card" onclick="buyHeal()" id="shopHeal">
          <div class="icon">🍖</div>
          <div class="title">ฟื้นฟู HP เต็ม</div>
          <div style="color: #f1c40f;">ราคา: 20 💰</div>
        </div>
        <div class="choice-card" onclick="buyAtk()" id="shopAtk">
          <div class="icon">⚔️</div>
          <div class="title">เพิ่ม ATK +5</div>
          <div style="color: #f1c40f;">ราคา: <span id="atkCost">30</span> 💰</div>
        </div>
        <div class="choice-card" onclick="buyHp()" id="shopHp">
          <div class="icon">❤️</div>
          <div class="title">เพิ่ม Max HP +20</div>
          <div style="color: #f1c40f;">ราคา: <span id="hpCost">30</span> 💰</div>
        </div>
      </div>
      <button onclick="leaveShop()">ออกเดินทางต่อ</button>
    </div>

  </div>

  <div id="gameOverView">
    <h1>GAME OVER</h1>
    <p style="font-size: 1.5rem; margin-bottom: 20px;">คุณตายในด่านที่ <span id="finalStage" style="color:#f1c40f"></span></p>
    <button onclick="startGame()">เริ่มการผจญภัยใหม่</button>
  </div>
</div>

<script>
// State
let player = { hp: 100, maxHp: 100, atk: 10, gold: 0, stage: 1 };
let enemy = { hp: 50, maxHp: 50, atk: 5, name: 'สไลม์', icon: '👾', goldDrop: 10 };
let battleInterval;
let atkUpgradeCost = 30;
let hpUpgradeCost = 30;

// UI Elements
const el = {
  stage: document.getElementById('stageVal'),
  gold: document.getElementById('goldVal'),
  pMaxHp: document.getElementById('pMaxHpVal'),
  pAtk: document.getElementById('pAtkVal'),
  
  eventView: document.getElementById('eventView'),
  battleView: document.getElementById('battleView'),
  shopView: document.getElementById('shopView'),
  gameOverView: document.getElementById('gameOverView'),
  
  choicesBox: document.getElementById('choicesContainer'),
  
  pHpBar: document.getElementById('pHpBar'),
  pHpText: document.getElementById('pHpText'),
  pSprite: document.getElementById('pSprite'),
  
  eHpBar: document.getElementById('eHpBar'),
  eHpText: document.getElementById('eHpText'),
  eName: document.getElementById('eName'),
  eSprite: document.getElementById('eSprite'),
  
  log: document.getElementById('battleLog'),
  btnContinue: document.getElementById('btnContinue')
};

const enemies = [
  { name: 'สไลม์', icon: '💧', hpBase: 30, atkBase: 4, gold: 10 },
  { name: 'ก็อบลิน', icon: '👺', hpBase: 50, atkBase: 8, gold: 15 },
  { name: 'หมาป่า', icon: '🐺', hpBase: 60, atkBase: 12, gold: 20 },
  { name: 'โครงกระดูก', icon: '💀', hpBase: 80, atkBase: 15, gold: 25 },
  { name: 'ออร์ค', icon: '👹', hpBase: 150, atkBase: 20, gold: 40 },
  { name: 'มังกร (BOSS)', icon: '🐉', hpBase: 300, atkBase: 35, gold: 100 }
];

function updateHeader() {
  el.stage.textContent = player.stage;
  el.gold.textContent = player.gold;
  el.pMaxHp.textContent = `${player.hp}/${player.maxHp}`;
  el.pAtk.textContent = player.atk;
}

function showView(viewName) {
  el.eventView.style.display = 'none';
  el.battleView.style.display = 'none';
  el.shopView.style.display = 'none';
  el.gameOverView.style.display = 'none';
  
  if(viewName === 'event') el.eventView.style.display = 'flex';
  if(viewName === 'battle') el.battleView.style.display = 'flex';
  if(viewName === 'shop') el.shopView.style.display = 'flex';
  if(viewName === 'gameover') el.gameOverView.style.display = 'flex';
  updateHeader();
}

// --- CORE LOGIC ---

function startGame() {
  player = { hp: 100, maxHp: 100, atk: 12, gold: 0, stage: 1 };
  atkUpgradeCost = 30;
  hpUpgradeCost = 30;
  generateChoices();
}

function generateChoices() {
  showView('event');
  el.choicesBox.innerHTML = '';
  
  // Every 5 stages is a guaranteed Campfire
  if (player.stage > 1 && player.stage % 5 === 0) {
    document.getElementById('eventTitle').textContent = "แคมป์พักแรมที่ปลอดภัย";
    document.getElementById('eventDesc').textContent = "คุณพบจุดพักแรม สามารถอัปเกรดและฟื้นฟูได้";
    addCard('🏕️', 'พักผ่อน', 'แวะร้านค้าและฟื้นฟู', () => openShop());
    return;
  }
  
  document.getElementById('eventTitle').textContent = `ด่านที่ ${player.stage}`;
  document.getElementById('eventDesc').textContent = "เลือกเส้นทางข้างหน้า...";
  
  // Normal choices
  let c1 = getEnemyByStage();
  addCard(c1.icon, 'ต่อสู้: ' + c1.name, 'ปะทะศัตรูเพื่อรับทอง', () => startBattle(c1));
  
  // Random event
  let r = Math.random();
  if (r < 0.2 && player.gold >= 15) {
    addCard('💰', 'เปิดหีบสมบัติ', 'จ่าย 15 ทองสุ่มของรางวัล', () => openChest());
  } else {
    let c2 = getEnemyByStage(true); // Slightly harder
    addCard('⚠️' + c2.icon, 'ต่อสู้แบบยาก', 'มอนสเตอร์เก่งขึ้น ทองx2', () => startBattle(c2, 2));
  }
}

function addCard(icon, title, desc, onClick) {
  const div = document.createElement('div');
  div.className = 'choice-card';
  div.innerHTML = `<div class="icon">${icon}</div><div class="title">${title}</div><div style="font-size:0.9rem; color:#aaa; text-align:center;">${desc}</div>`;
  div.onclick = onClick;
  el.choicesBox.appendChild(div);
}

function getEnemyByStage(isHard = false) {
  // Pool logic based on stage
  let poolIdx = Math.min(Math.floor((player.stage - 1) / 2), enemies.length - 2);
  if (isHard) poolIdx = Math.min(poolIdx + 1, enemies.length - 1);
  if (player.stage % 10 === 0) poolIdx = 5; // Boss every 10
  
  let base = enemies[poolIdx];
  let multiplier = 1 + (player.stage * 0.1);
  
  return {
    name: base.name + (isHard ? ' (ดุร้าย)' : ''),
    icon: base.icon,
    maxHp: Math.floor(base.hpBase * multiplier * (isHard ? 1.5 : 1)),
    atk: Math.floor(base.atkBase * multiplier * (isHard ? 1.5 : 1)),
    goldDrop: Math.floor(base.gold * (isHard ? 2 : 1))
  };
}

// --- BATTLE SYSTEM ---

function startBattle(enemyData) {
  enemy = { ...enemyData, hp: enemyData.maxHp };
  el.eName.textContent = enemy.name;
  el.eSprite.textContent = enemy.icon;
  el.log.innerHTML = '';
  el.btnContinue.style.display = 'none';
  
  updateBattleUI();
  showView('battle');
  logMsg(`เผชิญหน้ากับ ${enemy.name}!`);
  
  // Start Auto Battle Loop
  battleInterval = setInterval(battleTick, 800);
}

function battleTick() {
  // Player attacks
  let dmgP = Math.max(1, player.atk + Math.floor(Math.random() * 5) - 2);
  enemy.hp -= dmgP;
  logMsg(`คุณโจมตี สร้างความเสียหาย <span style="color:#f1c40f">${dmgP}</span>!`);
  animHit(el.eSprite);
  
  if (enemy.hp <= 0) {
    enemy.hp = 0;
    updateBattleUI();
    winBattle();
    return;
  }
  
  // Enemy attacks
  let dmgE = Math.max(1, enemy.atk + Math.floor(Math.random() * 3) - 1);
  player.hp -= dmgE;
  logMsg(`${enemy.name} โจมตี สร้างความเสียหาย <span style="color:#e74c3c">${dmgE}</span>!`);
  animHit(el.pSprite);
  updateHeader();
  
  if (player.hp <= 0) {
    player.hp = 0;
    updateBattleUI();
    loseBattle();
    return;
  }
  
  updateBattleUI();
}

function updateBattleUI() {
  let pPct = (player.hp / player.maxHp) * 100;
  let ePct = (enemy.hp / enemy.maxHp) * 100;
  el.pHpBar.style.width = `${pPct}%`;
  el.eHpBar.style.width = `${ePct}%`;
  el.pHpText.textContent = `${player.hp} / ${player.maxHp}`;
  el.eHpText.textContent = `${enemy.hp} / ${enemy.maxHp}`;
}

function animHit(element) {
  element.classList.add('hit-anim');
  setTimeout(() => element.classList.remove('hit-anim'), 150);
}

function logMsg(msg) {
  const div = document.createElement('div');
  div.innerHTML = msg;
  div.style.marginBottom = '5px';
  el.log.appendChild(div);
  el.log.scrollTop = el.log.scrollHeight;
}

function winBattle() {
  clearInterval(battleInterval);
  logMsg(`<strong style="color:#2ecc71">ชนะ!</strong> ได้รับทอง ${enemy.goldDrop} 💰`);
  player.gold += enemy.goldDrop;
  updateHeader();
  
  el.btnContinue.style.display = 'block';
  el.btnContinue.onclick = () => {
    player.stage++;
    generateChoices();
  };
}

function loseBattle() {
  clearInterval(battleInterval);
  logMsg(`<strong style="color:#e74c3c">คุณตายแล้ว...</strong>`);
  setTimeout(() => {
    document.getElementById('finalStage').textContent = player.stage;
    showView('gameover');
    window.parent?.postMessage({ type: 'GAME_OVER', score: player.stage * 10 }, '*');
  }, 1500);
}

// --- EVENTS ---

function openChest() {
  player.gold -= 15;
  let rand = Math.random();
  if (rand < 0.3) {
    player.atk += 5;
    alert("เจออาวุธระดับแรร์! ATK +5");
  } else if (rand < 0.6) {
    player.maxHp += 20;
    player.hp += 20;
    alert("เจอยาวิเศษ! Max HP +20");
  } else if (rand < 0.8) {
    player.gold += 50;
    alert("เจอสมบัติลับ! ได้รับ 50 ทอง");
  } else {
    alert("หีบว่างเปล่า... เสียใจด้วย");
  }
  player.stage++;
  generateChoices();
}

function openShop() {
  showView('shop');
  document.getElementById('atkCost').textContent = atkUpgradeCost;
  document.getElementById('hpCost').textContent = hpUpgradeCost;
}

function buyHeal() {
  if (player.gold >= 20 && player.hp < player.maxHp) {
    player.gold -= 20;
    player.hp = player.maxHp;
    updateHeader();
  }
}

function buyAtk() {
  if (player.gold >= atkUpgradeCost) {
    player.gold -= atkUpgradeCost;
    player.atk += 5;
    atkUpgradeCost += 15; // Price goes up
    document.getElementById('atkCost').textContent = atkUpgradeCost;
    updateHeader();
  }
}

function buyHp() {
  if (player.gold >= hpUpgradeCost) {
    player.gold -= hpUpgradeCost;
    player.maxHp += 20;
    player.hp += 20;
    hpUpgradeCost += 15;
    document.getElementById('hpCost').textContent = hpUpgradeCost;
    updateHeader();
  }
}

function leaveShop() {
  player.stage++;
  generateChoices();
}

// START
startGame();
</script>
</body>
</html>
