<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mini City (Minimal Builder)</title>
  <style>
    :root {
      --bg: #fdfbf7;
      --text: #2c3e50;
      --grid: #e0e0e0;
      --grass: #a8e6cf;
      --road: #95a5a6;
      --house: #ff8b94;
      --farm: #ffd3b6;
      --factory: #ffaaa5;
      --park: #dcedc1;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
    
    #gameWrapper { display: flex; flex-direction: column; align-items: center; gap: 20px; }
    
    /* Header Stats */
    #header { display: flex; gap: 30px; background: #fff; padding: 15px 30px; border-radius: 50px; box-shadow: 0 10px 20px rgba(0,0,0,0.05); font-weight: bold; font-size: 1.2rem; }
    .stat { display: flex; align-items: center; gap: 8px; }
    .stat span { font-size: 1.4rem; color: #34495e; }
    
    /* Main Board */
    #board { display: grid; grid-template-columns: repeat(12, 40px); grid-template-rows: repeat(12, 40px); gap: 2px; background: var(--grid); padding: 2px; border-radius: 8px; box-shadow: 0 15px 30px rgba(0,0,0,0.1); cursor: crosshair; }
    .cell { width: 40px; height: 40px; background: var(--grass); border-radius: 4px; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; transition: 0.2s; user-select: none; }
    .cell:hover { filter: brightness(0.9); transform: scale(0.95); }
    
    .cell.road { background: var(--road); }
    .cell.house { background: var(--house); }
    .cell.farm { background: var(--farm); }
    .cell.factory { background: var(--factory); }
    .cell.park { background: var(--park); }

    /* Build Menu */
    #toolbar { display: flex; gap: 15px; background: #fff; padding: 10px 20px; border-radius: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
    .tool { display: flex; flex-direction: column; align-items: center; padding: 10px 15px; border-radius: 12px; cursor: pointer; transition: 0.2s; border: 2px solid transparent; }
    .tool:hover { background: #f0f0f0; }
    .tool.active { border-color: #3498db; background: #eaf2f8; }
    .tool-icon { font-size: 1.8rem; margin-bottom: 5px; }
    .tool-cost { font-size: 0.8rem; color: #7f8c8d; font-weight: bold; }

    /* Floating Text */
    .floating-text { position: absolute; pointer-events: none; font-weight: bold; font-size: 1.2rem; text-shadow: 0 2px 4px rgba(0,0,0,0.2); animation: floatUp 1s ease-out forwards; z-index: 100; }
    @keyframes floatUp { 0% { opacity: 1; transform: translateY(0); } 100% { opacity: 0; transform: translateY(-40px); } }
    
    /* Overlay */
    #overlay { position: absolute; inset: 0; background: rgba(253,251,247,0.9); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 50; text-align: center; }
    #overlay h1 { font-size: 4rem; color: var(--text); margin-bottom: 10px; font-weight: 900; letter-spacing: -1px; }
    #overlay p { font-size: 1.2rem; color: #7f8c8d; margin-bottom: 30px; }
    button.start-btn { background: var(--text); color: #fff; border: none; padding: 15px 40px; font-size: 1.2rem; font-weight: bold; border-radius: 50px; cursor: pointer; transition: 0.3s; box-shadow: 0 10px 20px rgba(44,62,80,0.2); }
    button.start-btn:hover { background: #1a252f; transform: translateY(-3px); box-shadow: 0 15px 25px rgba(44,62,80,0.3); }
  </style>

<style>/* global-responsive-fix */ canvas, #gameContainer { max-width: 100vw !important; max-height: 100vh !important; object-fit: contain !important; } body { overflow: hidden !important; touch-action: none; }</style>
</head>
<body>

<div id="gameWrapper">
  <div id="header">
    <div class="stat">💰 <span id="valMoney">100</span></div>
    <div class="stat">👥 <span id="valPop">0</span></div>
    <div class="stat">🌾 <span id="valFood">0</span></div>
    <div class="stat">ประชากรพอใจ: <span id="valHappy" style="color:#2ecc71">100%</span></div>
  </div>

  <div id="board"></div>

  <div id="toolbar">
    <div class="tool active" data-type="road">
      <div class="tool-icon">🛣️</div>
      <div>ถนน</div>
      <div class="tool-cost">$5</div>
    </div>
    <div class="tool" data-type="house">
      <div class="tool-icon">🏠</div>
      <div>บ้าน</div>
      <div class="tool-cost">$20</div>
    </div>
    <div class="tool" data-type="farm">
      <div class="tool-icon">🌾</div>
      <div>ฟาร์ม</div>
      <div class="tool-cost">$30</div>
    </div>
    <div class="tool" data-type="factory">
      <div class="tool-icon">🏭</div>
      <div>โรงงาน</div>
      <div class="tool-cost">$50</div>
    </div>
    <div class="tool" data-type="park">
      <div class="tool-icon">🌲</div>
      <div>สวนสาธารณะ</div>
      <div class="tool-cost">$15</div>
    </div>
    <div class="tool" data-type="remove" style="margin-left: 20px;">
      <div class="tool-icon">🔨</div>
      <div>รื้อถอน</div>
      <div class="tool-cost">ฟรี</div>
    </div>
  </div>
</div>

<div id="overlay">
  <h1>Mini City</h1>
  <p>สร้างเมืองจิ๋วแนวมินิมอล บริหารงบประมาณ อาหาร และความสุขของประชากร</p>
  <button class="start-btn" onclick="startGame()">เริ่มสร้างเมือง</button>
</div>

<script>
const boardSize = 12;
const boardEl = document.getElementById('board');
const tools = document.querySelectorAll('.tool');

let res = { money: 100, pop: 0, food: 0, happy: 100 };
let map = [];
let currentTool = 'road';
let gameTickInterval;

const costs = { road: 5, house: 20, farm: 30, factory: 50, park: 15, remove: 0 };
const icons = { road: '', house: '🏠', farm: '🌾', factory: '🏭', park: '🌲', empty: '' };

// Build board
for (let y = 0; y < boardSize; y++) {
  map[y] = [];
  for (let x = 0; x < boardSize; x++) {
    map[y][x] = { type: 'empty' };
    const cell = document.createElement('div');
    cell.className = 'cell';
    cell.dataset.x = x;
    cell.dataset.y = y;
    cell.addEventListener('mousedown', (e) => placeBuilding(x, y, e));
    cell.addEventListener('mouseenter', (e) => { if(e.buttons === 1) placeBuilding(x, y, e); });
    boardEl.appendChild(cell);
  }
}

// Tool selection
tools.forEach(tool => {
  tool.addEventListener('click', () => {
    tools.forEach(t => t.classList.remove('active'));
    tool.classList.add('active');
    currentTool = tool.dataset.type;
  });
});

function getCellEl(x, y) {
  return boardEl.children[y * boardSize + x];
}

function showFloatingText(x, y, text, color) {
  const cell = getCellEl(x, y);
  const rect = cell.getBoundingClientRect();
  const el = document.createElement('div');
  el.className = 'floating-text';
  el.textContent = text;
  el.style.color = color;
  el.style.left = rect.left + 10 + 'px';
  el.style.top = rect.top + 'px';
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 1000);
}

function placeBuilding(x, y, e) {
  if (currentTool === 'remove') {
    if (map[y][x].type !== 'empty') {
      map[y][x].type = 'empty';
      updateCellVisual(x, y);
      recalcStats();
    }
    return;
  }
  
  if (map[y][x].type === currentTool) return; // Same
  if (map[y][x].type !== 'empty') return; // Occupied
  
  let cost = costs[currentTool];
  if (res.money >= cost) {
    res.money -= cost;
    map[y][x].type = currentTool;
    updateCellVisual(x, y);
    showFloatingText(x, y, `-$${cost}`, '#e74c3c');
    recalcStats();
    updateUI();
  } else {
    showFloatingText(x, y, "เงินไม่พอ!", '#e74c3c');
  }
}

function updateCellVisual(x, y) {
  const cell = getCellEl(x, y);
  const type = map[y][x].type;
  cell.className = 'cell ' + (type !== 'empty' ? type : '');
  cell.textContent = icons[type];
}

function recalcStats() {
  let pop = 0;
  let foodProduced = 0;
  let parks = 0;
  
  for (let y = 0; y < boardSize; y++) {
    for (let x = 0; x < boardSize; x++) {
      let t = map[y][x].type;
      if (t === 'house') pop += 4;
      if (t === 'farm') foodProduced += 10;
      if (t === 'park') parks += 1;
    }
  }
  
  res.pop = pop;
  // Calculate Happiness
  let happy = 100;
  if (res.food < pop) happy -= 30; // Not enough food
  if (pop > 0 && parks === 0) happy -= 10; // No parks
  if (parks > pop/4) happy += 10; // Lots of parks
  
  res.happy = Math.min(100, Math.max(0, happy));
  updateUI();
}

function gameTick() {
  let income = 0;
  let foodChange = 0;
  
  for (let y = 0; y < boardSize; y++) {
    for (let x = 0; x < boardSize; x++) {
      let t = map[y][x].type;
      
      if (t === 'house') {
        // Taxes based on happiness
        income += Math.floor(2 * (res.happy / 100));
        foodChange -= 1; // consume food
      }
      else if (t === 'farm') {
        foodChange += 3; // produce food
      }
      else if (t === 'factory') {
        income += 10; // big income
        // Reduces happiness slightly if close to houses (skipped for simple version)
      }
    }
  }
  
  res.money += income;
  res.food += foodChange;
  if (res.food < 0) res.food = 0;
  
  if (income > 0) {
    // Show random income text
    let rx = Math.floor(Math.random() * boardSize);
    let ry = Math.floor(Math.random() * boardSize);
    if(map[ry][rx].type !== 'empty') showFloatingText(rx, ry, `+$${income}`, '#2ecc71');
  }
  
  recalcStats();
  
  // End condition (just for arcade score tracking)
  if (res.money > 10000) {
    window.parent?.postMessage({ type: 'GAME_OVER', score: res.pop * 100 }, '*');
  }
}

function updateUI() {
  document.getElementById('valMoney').textContent = res.money;
  document.getElementById('valPop').textContent = res.pop;
  document.getElementById('valFood').textContent = res.food;
  const hEl = document.getElementById('valHappy');
  hEl.textContent = res.happy + '%';
  hEl.style.color = res.happy >= 80 ? '#2ecc71' : res.happy >= 50 ? '#f1c40f' : '#e74c3c';
}

function startGame() {
  document.getElementById('overlay').style.display = 'none';
  gameTickInterval = setInterval(gameTick, 2000); // Every 2 seconds is a "month"
  updateUI();
}
</script>
</body>
</html>
