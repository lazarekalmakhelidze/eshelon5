<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Math Ninja</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #1e1b4b; /* PreExam Dark Theme */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            color: white;
            font-family: 'Kanit', sans-serif;
            overflow: hidden;
        }
        .game-container {
            position: relative;
            width: 400px;
            height: 600px;
            background-color: #2e2865;
            border-radius: 12px;
            border: 4px solid #6366f1;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .header {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            padding: 15px 20px;
            box-sizing: border-box;
            display: flex;
            justify-content: space-between;
            font-size: 20px;
            font-weight: bold;
            background: rgba(30, 27, 75, 0.8);
            z-index: 10;
        }
        .input-area {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            padding: 20px;
            box-sizing: border-box;
            background: rgba(30, 27, 75, 0.9);
            display: flex;
            gap: 10px;
            z-index: 10;
        }
        input[type="number"] {
            flex: 1;
            padding: 12px;
            font-size: 24px;
            border-radius: 8px;
            border: 2px solid #6366f1;
            background: #1e1b4b;
            color: white;
            text-align: center;
            outline: none;
            font-family: 'Kanit', sans-serif;
        }
        input[type="number"]:focus {
            border-color: #10b981;
        }
        .equation {
            position: absolute;
            font-size: 28px;
            font-weight: bold;
            background: #fbbf24;
            color: #1e1b4b;
            padding: 8px 16px;
            border-radius: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            white-space: nowrap;
            transition: top 0.05s linear;
        }
        .game-over {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 20;
            display: none;
            backdrop-filter: blur(4px);
        }
        .game-over h1 {
            color: #ef4444;
            font-size: 36px;
            margin-bottom: 10px;
        }
        button {
            background: #6366f1;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 18px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 20px;
            transition: background 0.3s;
            font-family: 'Kanit', sans-serif;
        }
        button:hover {
            background: #4f46e5;
        }
        .hearts {
            color: #ef4444;
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@400;700&display=swap" rel="stylesheet">

<style>/* global-responsive-fix */ canvas, #gameContainer { max-width: 100vw !important; max-height: 100vh !important; object-fit: contain !important; } body { overflow: hidden !important; touch-action: none; }</style>
</head>
<body>

    <div class="game-container" id="gameContainer">
        <div class="header">
            <div>คะแนน: <span id="score">0</span></div>
            <div class="hearts" id="hearts">❤️❤️❤️</div>
        </div>
        
        <div id="equationsArea"></div>

        <div class="input-area">
            <input type="number" id="answerInput" placeholder="พิมพ์คำตอบแล้วกด Enter" autocomplete="off">
        </div>

        <div class="game-over" id="gameOverModal">
            <h1>เกมจบแล้ว!</h1>
            <p style="font-size: 20px">คะแนนที่ได้: <span id="finalScore">0</span></p>
            <button onclick="startGame()">เล่นใหม่</button>
        </div>
    </div>

    <script>
        const answerInput = document.getElementById('answerInput');
        const scoreElement = document.getElementById('score');
        const heartsElement = document.getElementById('hearts');
        const equationsArea = document.getElementById('equationsArea');
        const gameOverModal = document.getElementById('gameOverModal');
        const finalScoreElement = document.getElementById('finalScore');
        const container = document.getElementById('gameContainer');

        let score = 0;
        let lives = 3;
        let equations = [];
        let gameLoopId;
        let spawnIntervalId;
        let speedMultiplier = 1;
        let isGameOver = false;

        const operators = ['+', '-', '*'];

        function generateEquation() {
            let num1, num2, operator, answer;
            let diff = Math.min(Math.floor(score / 5), 3); // Increase difficulty every 5 score

            operator = operators[Math.floor(Math.random() * (diff === 0 ? 2 : 3))]; // Introduce * later

            if (operator === '+') {
                num1 = Math.floor(Math.random() * (10 + diff * 10)) + 1;
                num2 = Math.floor(Math.random() * (10 + diff * 10)) + 1;
                answer = num1 + num2;
            } else if (operator === '-') {
                num1 = Math.floor(Math.random() * (10 + diff * 10)) + 5;
                num2 = Math.floor(Math.random() * num1) + 1; // Ensure positive answer
                answer = num1 - num2;
            } else {
                num1 = Math.floor(Math.random() * (5 + diff * 2)) + 2;
                num2 = Math.floor(Math.random() * (5 + diff * 2)) + 2;
                answer = num1 * num2;
            }

            const text = `${num1} ${operator === '*' ? '×' : operator} ${num2}`;
            
            const el = document.createElement('div');
            el.className = 'equation';
            el.textContent = text;
            
            // Random X position between 20 and width-100
            const x = Math.floor(Math.random() * (container.clientWidth - 120)) + 20;
            el.style.left = `${x}px`;
            el.style.top = '-50px';
            
            equationsArea.appendChild(el);

            equations.push({
                el: el,
                answer: answer,
                y: -50,
                speed: 1 + Math.random() * 0.5 + (score * 0.05) // Speed increases with score
            });
        }

        function updateGame() {
            if (isGameOver) return;

            for (let i = 0; i < equations.length; i++) {
                let eq = equations[i];
                eq.y += eq.speed;
                eq.el.style.top = `${eq.y}px`;

                // If hits the bottom (input area is ~80px tall)
                if (eq.y > container.clientHeight - 100) {
                    // Lose a life
                    eq.el.remove();
                    equations.splice(i, 1);
                    i--;
                    loseLife();
                }
            }

            gameLoopId = requestAnimationFrame(updateGame);
        }

        function loseLife() {
            lives--;
            updateHearts();
            
            // Flash red
            container.style.borderColor = '#ef4444';
            setTimeout(() => {
                if(!isGameOver) container.style.borderColor = '#6366f1';
            }, 300);

            if (lives <= 0) {
                gameOver();
            }
        }

        function updateHearts() {
            let h = '';
            for(let i=0; i<lives; i++) h += '❤️';
            for(let i=lives; i<3; i++) h += '🖤';
            heartsElement.textContent = h;
        }

        function checkAnswer() {
            if (isGameOver) return;
            
            const val = parseInt(answerInput.value);
            if (isNaN(val)) return;

            // Find matching answer (lowest Y first)
            let matchedIdx = -1;
            let lowestY = -100;

            for (let i = 0; i < equations.length; i++) {
                if (equations[i].answer === val) {
                    if (equations[i].y > lowestY) {
                        lowestY = equations[i].y;
                        matchedIdx = i;
                    }
                }
            }

            if (matchedIdx !== -1) {
                // Correct!
                equations[matchedIdx].el.remove();
                equations.splice(matchedIdx, 1);
                score++;
                scoreElement.textContent = score;
                answerInput.value = '';
                
                // Flash green
                container.style.borderColor = '#10b981';
                setTimeout(() => {
                    if(!isGameOver) container.style.borderColor = '#6366f1';
                }, 200);
            }
        }

        answerInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                checkAnswer();
                answerInput.value = ''; // clear if wrong too
            }
        });

        function gameOver() {
            isGameOver = true;
            cancelAnimationFrame(gameLoopId);
            clearInterval(spawnIntervalId);
            
            finalScoreElement.textContent = score;
            gameOverModal.style.display = 'flex';
            container.style.borderColor = '#ef4444';
            answerInput.blur();
            window.parent.postMessage({ type: 'GAME_OVER', score: score }, '*');
        }

        function startGame() {
            // Reset
            equationsArea.innerHTML = '';
            equations = [];
            score = 0;
            lives = 3;
            isGameOver = false;
            
            scoreElement.textContent = score;
            updateHearts();
            gameOverModal.style.display = 'none';
            container.style.borderColor = '#6366f1';
            answerInput.value = '';
            
            // Start loops
            gameLoopId = requestAnimationFrame(updateGame);
            
            // Spawn equations every 2 seconds, slightly faster as score goes up
            const spawnRate = Math.max(800, 2500 - score * 50);
            spawnIntervalId = setInterval(generateEquation, spawnRate);
            
            // Initial spawn
            generateEquation();
            
            answerInput.focus();
        }

        // Focus input on click anywhere
        container.addEventListener('click', () => {
            if (!isGameOver) answerInput.focus();
        });

        // Start
        startGame();
    </script>
</body>
</html>
