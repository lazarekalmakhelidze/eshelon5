<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Color Brain Test</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #1e1b4b; /* PreExam Dark Theme */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            color: white;
            font-family: 'Kanit', sans-serif;
            overflow: hidden;
        }
        .game-container {
            position: relative;
            width: 400px;
            height: 600px;
            background-color: #2e2865;
            border-radius: 12px;
            border: 4px solid #6366f1;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
        }
        .header {
            width: 100%;
            padding: 15px 20px;
            box-sizing: border-box;
            display: flex;
            justify-content: space-between;
            font-size: 20px;
            font-weight: bold;
            background: rgba(30, 27, 75, 0.8);
            z-index: 10;
        }
        .timer-bar {
            width: 100%;
            height: 10px;
            background-color: #374151;
        }
        .timer-fill {
            height: 100%;
            background-color: #10b981;
            width: 100%;
            transition: width 0.1s linear, background-color 0.3s;
        }
        .play-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
        }
        .instruction {
            font-size: 18px;
            color: #9ca3af;
            margin-bottom: 20px;
        }
        .color-word {
            font-size: 64px;
            font-weight: bold;
            margin-bottom: 40px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }
        .buttons-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            width: 100%;
            padding: 0 20px;
            box-sizing: border-box;
        }
        .color-btn {
            padding: 20px 0;
            font-size: 20px;
            font-weight: bold;
            color: white;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: transform 0.1s, opacity 0.2s;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            font-family: 'Kanit', sans-serif;
        }
        .color-btn:active {
            transform: scale(0.95);
        }
        .color-btn:hover {
            opacity: 0.9;
        }
        
        .game-over, .start-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 20;
            backdrop-filter: blur(4px);
            text-align: center;
        }
        .start-screen {
            background: #2e2865; /* solid for start */
        }
        .game-over h1, .start-screen h1 {
            color: #ef4444;
            font-size: 36px;
            margin-bottom: 10px;
        }
        .start-screen h1 {
            color: #fbbf24;
        }
        button.action-btn {
            background: #6366f1;
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 30px;
            transition: background 0.3s;
            font-family: 'Kanit', sans-serif;
        }
        button.action-btn:hover {
            background: #4f46e5;
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@400;700&display=swap" rel="stylesheet">

<style>/* global-responsive-fix */ canvas, #gameContainer { max-width: 100vw !important; max-height: 100vh !important; object-fit: contain !important; } body { overflow: hidden !important; touch-action: none; }</style>
</head>
<body>

    <div class="game-container">
        <!-- Start Screen -->
        <div class="start-screen" id="startScreen">
            <h1>Color Brain</h1>
            <p style="font-size: 18px; padding: 0 20px; color: #d1d5db;">
                เกมทดสอบความแยกประสาท (Stroop Effect) <br><br>
                กติกา: <span style="color: #fbbf24;">ให้กดปุ่ม "สีของตัวอักษร"</span> <br>
                <span style="color: #ef4444;">ห้ามกดตามคำที่อ่านเด็ดขาด!</span>
            </p>
            <p style="font-size: 16px; color: #9ca3af;">เช่น คำว่า "แดง" แต่พิมพ์ด้วย <span style="color:#3b82f6">สีฟ้า</span> ให้กดปุ่ม "สีฟ้า"</p>
            <button class="action-btn" onclick="startGame()">เริ่มเกม</button>
        </div>

        <div class="header">
            <div>คะแนน: <span id="score">0</span></div>
            <div>สถิติ: <span id="highScore">0</span></div>
        </div>
        
        <div class="timer-bar">
            <div class="timer-fill" id="timerFill"></div>
        </div>

        <div class="play-area">
            <div class="instruction">สีของคำนี้คือสีอะไร?</div>
            <div class="color-word" id="colorWord">คำศัพท์</div>
            
            <div class="buttons-grid" id="buttonsGrid">
                <!-- Buttons injected by JS -->
            </div>
        </div>

        <div class="game-over" id="gameOverModal">
            <h1>เกมจบแล้ว!</h1>
            <p style="font-size: 20px">คะแนนของคุณ: <span id="finalScore">0</span></p>
            <button class="action-btn" onclick="startGame()">เล่นอีกครั้ง</button>
        </div>
    </div>

    <script>
        const scoreElement = document.getElementById('score');
        const highScoreElement = document.getElementById('highScore');
        const colorWordElement = document.getElementById('colorWord');
        const buttonsGrid = document.getElementById('buttonsGrid');
        const timerFill = document.getElementById('timerFill');
        const gameOverModal = document.getElementById('gameOverModal');
        const startScreen = document.getElementById('startScreen');
        const finalScoreElement = document.getElementById('finalScore');

        // Available Colors
        const colors = [
            { id: 'red', name: 'แดง', hex: '#ef4444' },
            { id: 'blue', name: 'ฟ้า', hex: '#3b82f6' },
            { id: 'green', name: 'เขียว', hex: '#10b981' },
            { id: 'yellow', name: 'เหลือง', hex: '#eab308' },
            { id: 'purple', name: 'ม่วง', hex: '#a855f7' },
            { id: 'orange', name: 'ส้ม', hex: '#f97316' }
        ];

        let score = 0;
        let highScore = localStorage.getItem('colorBrainHighScore') || 0;
        highScoreElement.textContent = highScore;
        
        let currentTargetColorId = '';
        
        let timeRemaining = 100; // Percentage
        let timerInterval;
        let isGameOver = false;

        function startGame() {
            score = 0;
            scoreElement.textContent = score;
            isGameOver = false;
            
            startScreen.style.display = 'none';
            gameOverModal.style.display = 'none';
            
            nextQuestion();
        }

        function nextQuestion() {
            if (isGameOver) return;
            
            // Generate random word and random color
            const wordColorIndex = Math.floor(Math.random() * colors.length);
            const fontColorIndex = Math.floor(Math.random() * colors.length);
            
            const wordObj = colors[wordColorIndex];
            const fontObj = colors[fontColorIndex];
            
            currentTargetColorId = fontObj.id; // The correct answer is the FONT color
            
            colorWordElement.textContent = wordObj.name;
            colorWordElement.style.color = fontObj.hex;
            
            // Pick 4 options including the correct one
            let options = [fontObj];
            while (options.length < 4) {
                let randomOpt = colors[Math.floor(Math.random() * colors.length)];
                if (!options.find(o => o.id === randomOpt.id)) {
                    options.push(randomOpt);
                }
            }
            
            // Shuffle options
            options.sort(() => Math.random() - 0.5);
            
            // Render buttons
            buttonsGrid.innerHTML = '';
            options.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = 'color-btn';
                btn.style.backgroundColor = opt.hex;
                btn.textContent = opt.name;
                
                // Add dark text for yellow to make it readable
                if (opt.id === 'yellow') {
                    btn.style.color = '#1e1b4b';
                }
                
                btn.onclick = () => checkAnswer(opt.id);
                buttonsGrid.appendChild(btn);
            });
            
            // Reset and start timer
            clearInterval(timerInterval);
            timeRemaining = 100;
            timerFill.style.width = '100%';
            timerFill.style.backgroundColor = '#10b981';
            
            // Calculate speed based on score
            // Starts at ~3 seconds, gets faster
            const decrementRate = 0.5 + (score * 0.05);
            
            timerInterval = setInterval(() => {
                timeRemaining -= decrementRate;
                timerFill.style.width = `${timeRemaining}%`;
                
                if (timeRemaining < 50 && timeRemaining > 20) {
                    timerFill.style.backgroundColor = '#eab308'; // Yellow
                } else if (timeRemaining <= 20) {
                    timerFill.style.backgroundColor = '#ef4444'; // Red
                }
                
                if (timeRemaining <= 0) {
                    gameOver();
                }
            }, 20); // 50 FPS
        }

        function checkAnswer(selectedColorId) {
            if (isGameOver) return;
            
            if (selectedColorId === currentTargetColorId) {
                // Correct
                score++;
                scoreElement.textContent = score;
                nextQuestion();
            } else {
                // Wrong
                gameOver();
            }
        }

        function gameOver() {
            isGameOver = true;
            clearInterval(timerInterval);
            
            if (score > highScore) {
                highScore = score;
                localStorage.setItem('colorBrainHighScore', highScore);
                highScoreElement.textContent = highScore;
            }
            
            finalScoreElement.textContent = score;
            gameOverModal.style.display = 'flex';
            window.parent.postMessage({ type: 'GAME_OVER', score: score }, '*');
        }
    </script>
</body>
</html>
