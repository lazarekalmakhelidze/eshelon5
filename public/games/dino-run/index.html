<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dino Run</title>
    <style>
        body { margin: 0; padding: 0; background-color: #f3f4f6; font-family: 'Arial', sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        h1 { margin-bottom: 20px; color: #374151; }
        .game-container { width: 600px; height: 200px; border-bottom: 3px solid #374151; position: relative; overflow: hidden; background: #fff; box-shadow: 0 10px 20px rgba(0,0,0,0.1); border-radius: 10px 10px 0 0; }
        #dino { width: 40px; height: 40px; background: #10b981; position: absolute; bottom: 0; left: 50px; border-radius: 10px 10px 0 0; display: flex; justify-content: center; align-items: center; color: white; font-weight: bold; }
        .cactus { width: 20px; height: 40px; background: #ef4444; position: absolute; bottom: 0; right: -20px; border-radius: 10px 10px 0 0; }
        .score-board { display: flex; justify-content: space-between; width: 600px; margin-bottom: 10px; font-weight: bold; font-size: 1.2rem; color: #374151; }
        
        .game-over { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); flex-direction: column; align-items: center; justify-content: center; z-index: 10; color: white; }
        .game-over h2 { font-size: 3rem; margin: 0; color: #ef4444; }
        .game-over button { margin-top: 20px; padding: 10px 30px; font-size: 1.2rem; font-weight: bold; border-radius: 5px; border: none; background: #10b981; color: white; cursor: pointer; }
        .instructions { margin-top: 20px; color: #6b7280; }
    </style>

<style>/* global-responsive-fix */ canvas, #gameContainer { max-width: 100vw !important; max-height: 100vh !important; object-fit: contain !important; } body { overflow: hidden !important; touch-action: none; }</style>
</head>
<body>
    <h1>Dino Run</h1>
    <div class="score-board">
        <div>คะแนน: <span id="score">0</span></div>
        <div>High Score: <span id="highScore">0</span></div>
    </div>
    
    <div class="game-container" id="gameArea" tabindex="0">
        <div id="dino">🦖</div>
    </div>
    <div class="instructions">กด Spacebar, ลูกศรขึ้น หรือแตะหน้าจอเพื่อกระโดด</div>

    <div class="game-over" id="gameOverModal">
        <h2>ชนแล้ว!</h2>
        <p>คะแนนของคุณ: <span id="finalScore">0</span></p>
        <button onclick="startGame()">เล่นอีกครั้ง</button>
    </div>

    <script>
        const dino = document.getElementById('dino');
        const gameArea = document.getElementById('gameArea');
        const scoreEl = document.getElementById('score');
        const highScoreEl = document.getElementById('highScore');
        const gameOverModal = document.getElementById('gameOverModal');
        const finalScoreEl = document.getElementById('finalScore');

        let isJumping = false;
        let isGameOver = false;
        let score = 0;
        let highScore = localStorage.getItem('dinoHighScore') || 0;
        let obstacles = [];
        let gameLoopId;
        let scoreIntervalId;
        
        highScoreEl.textContent = highScore;

        function jump() {
            if (isJumping || isGameOver) return;
            isJumping = true;
            let position = 0;
            let upInterval = setInterval(() => {
                if (position >= 120) {
                    clearInterval(upInterval);
                    let downInterval = setInterval(() => {
                        if (position <= 0) {
                            clearInterval(downInterval);
                            isJumping = false;
                        }
                        position -= 5;
                        dino.style.bottom = position + 'px';
                    }, 20);
                }
                position += 5;
                dino.style.bottom = position + 'px';
            }, 20);
        }

        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space' || e.code === 'ArrowUp') {
                jump();
            }
        });
        gameArea.addEventListener('touchstart', (e) => {
            e.preventDefault();
            jump();
        });

        function spawnObstacle() {
            if (isGameOver) return;
            const obstacle = document.createElement('div');
            obstacle.classList.add('cactus');
            obstacle.style.right = '-20px';
            // Random height 20-50
            const height = Math.random() * 30 + 20;
            obstacle.style.height = height + 'px';
            gameArea.appendChild(obstacle);
            
            let obstaclePos = -20;
            let moveInterval = setInterval(() => {
                if (isGameOver) {
                    clearInterval(moveInterval);
                    return;
                }
                obstaclePos += 5;
                obstacle.style.right = obstaclePos + 'px';

                // Collision detection
                // Dino is at left: 50, width: 40 (so 50 to 90)
                // Obstacle is at right: obstaclePos. So left is 600 - obstaclePos - 20
                let obstacleLeft = 600 - obstaclePos - 20;
                let dinoBottom = parseInt(window.getComputedStyle(dino).getPropertyValue('bottom'));
                
                if (obstacleLeft > 50 && obstacleLeft < 90 && dinoBottom < height) {
                    gameOver();
                }

                if (obstaclePos > 620) {
                    clearInterval(moveInterval);
                    obstacle.remove();
                }
            }, 20);

            // Random next spawn
            const nextTime = Math.random() * 1000 + 800;
            setTimeout(spawnObstacle, nextTime);
        }

        function gameOver() {
            isGameOver = true;
            clearInterval(scoreIntervalId);
            if (score > highScore) {
                highScore = score;
                localStorage.setItem('dinoHighScore', highScore);
                highScoreEl.textContent = highScore;
            }
            finalScoreEl.textContent = score;
            gameOverModal.style.display = 'flex';
            window.parent.postMessage({ type: 'GAME_OVER', score: score }, '*');
        }

        function startGame() {
            isGameOver = false;
            score = 0;
            scoreEl.textContent = score;
            gameOverModal.style.display = 'none';
            document.querySelectorAll('.cactus').forEach(c => c.remove());
            dino.style.bottom = '0px';
            isJumping = false;

            clearInterval(scoreIntervalId);
            scoreIntervalId = setInterval(() => {
                if (!isGameOver) {
                    score++;
                    scoreEl.textContent = score;
                }
            }, 100);

            setTimeout(spawnObstacle, 1000);
        }

        startGame();
    </script>
</body>
</html>
