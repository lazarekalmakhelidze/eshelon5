<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snake Game</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #1e1b4b; /* Matches PreExam dark theme */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            color: white;
            font-family: 'Kanit', sans-serif;
            overflow: hidden;
        }
        canvas {
            background-color: #2e2865;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border-radius: 10px;
            border: 4px solid #6366f1;
        }
        .score-board {
            display: flex;
            justify-content: space-between;
            width: 400px;
            margin-bottom: 20px;
            font-size: 24px;
            font-weight: bold;
        }
        .game-over {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.8);
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            display: none;
        }
        .game-over h1 {
            color: #ef4444;
            margin-top: 0;
        }
        button {
            background: #6366f1;
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 18px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 20px;
            transition: background 0.3s;
        }
        button:hover {
            background: #4f46e5;
        }
        .controls-hint {
            margin-top: 20px;
            color: #9ca3af;
            font-size: 14px;
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@400;700&display=swap" rel="stylesheet">

<style>/* global-responsive-fix */ canvas, #gameContainer { max-width: 100vw !important; max-height: 100vh !important; object-fit: contain !important; } body { overflow: hidden !important; touch-action: none; }</style>
</head>
<body>

    <div class="score-board">
        <div>คะแนน: <span id="score">0</span></div>
        <div>สถิติสูงสุด: <span id="highScore">0</span></div>
    </div>

    <canvas id="gameCanvas" width="400" height="400"></canvas>

    <div class="controls-hint">ใช้ปุ่มลูกศร (⬅️ ⬆️ ⬇️ ➡️) หรือปุ่ม W A S D ในการควบคุมทิศทาง</div>

    <div class="game-over" id="gameOverModal">
        <h1>เกมจบแล้ว!</h1>
        <p>คะแนนของคุณคือ: <span id="finalScore">0</span></p>
        <button onclick="resetGame()">เล่นใหม่</button>
    </div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const scoreElement = document.getElementById("score");
        const highScoreElement = document.getElementById("highScore");
        const gameOverModal = document.getElementById("gameOverModal");
        const finalScoreElement = document.getElementById("finalScore");

        const gridSize = 20;
        const tileCount = canvas.width / gridSize;
        
        let snake = [];
        let snakeLength = 3;
        let headX = 10;
        let headY = 10;
        let velocityX = 0;
        let velocityY = 0;
        
        let appleX = 15;
        let appleY = 15;
        
        let score = 0;
        let highScore = localStorage.getItem("snakeHighScore") || 0;
        highScoreElement.textContent = highScore;
        
        let isGameOver = false;
        let gameLoopTimeout;

        function startGame() {
            snake = [];
            for (let i = 0; i < snakeLength; i++) {
                snake.push({x: headX, y: headY});
            }
            placeApple();
            isGameOver = false;
            gameOverModal.style.display = "none";
            gameLoop();
        }

        function gameLoop() {
            if (isGameOver) return;
            
            update();
            draw();
            
            // Adjust speed based on score (faster as score increases)
            let speed = 100 - Math.min(score * 2, 60);
            gameLoopTimeout = setTimeout(gameLoop, speed);
        }

        function update() {
            // Move snake head
            headX += velocityX;
            headY += velocityY;

            // Check wall collision (Wrap around or die? Let's make it die)
            if (headX < 0 || headX >= tileCount || headY < 0 || headY >= tileCount) {
                gameOver();
                return;
            }

            // Check self collision
            for (let i = 0; i < snake.length; i++) {
                if (snake[i].x === headX && snake[i].y === headY && snake.length > 3) {
                    gameOver();
                    return;
                }
            }

            // Move snake body
            snake.unshift({x: headX, y: headY});

            // Check apple collision
            if (headX === appleX && headY === appleY) {
                score += 10;
                scoreElement.textContent = score;
                placeApple();
            } else {
                // If didn't eat apple, remove tail
                snake.pop();
            }
        }

        function draw() {
            // Clear canvas
            ctx.fillStyle = "#2e2865";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Draw apple
            ctx.fillStyle = "#ef4444";
            ctx.beginPath();
            ctx.arc(appleX * gridSize + gridSize/2, appleY * gridSize + gridSize/2, gridSize/2 - 2, 0, Math.PI * 2);
            ctx.fill();

            // Draw snake
            for (let i = 0; i < snake.length; i++) {
                ctx.fillStyle = i === 0 ? "#10b981" : "#34d399"; // Head is darker green
                
                // Draw rounded rects for snake body
                ctx.beginPath();
                ctx.roundRect(snake[i].x * gridSize + 1, snake[i].y * gridSize + 1, gridSize - 2, gridSize - 2, 4);
                ctx.fill();
            }
        }

        function placeApple() {
            appleX = Math.floor(Math.random() * tileCount);
            appleY = Math.floor(Math.random() * tileCount);
            
            // Make sure apple doesn't spawn on snake
            for (let i = 0; i < snake.length; i++) {
                if (snake[i].x === appleX && snake[i].y === appleY) {
                    placeApple();
                    break;
                }
            }
        }

        function gameOver() {
            isGameOver = true;
            if (score > highScore) {
                highScore = score;
                localStorage.setItem("snakeHighScore", highScore);
                highScoreElement.textContent = highScore;
            }
            finalScoreElement.textContent = score;
            gameOverModal.style.display = "block";
            window.parent.postMessage({ type: 'GAME_OVER', score: score }, '*');
        }

        function resetGame() {
            headX = 10;
            headY = 10;
            velocityX = 0;
            velocityY = 0;
            score = 0;
            snakeLength = 3;
            scoreElement.textContent = score;
            clearTimeout(gameLoopTimeout);
            startGame();
        }

        // Controls
        document.addEventListener("keydown", (e) => {
            if (["ArrowUp", "ArrowDown", "ArrowLeft", "ArrowRight", "w", "a", "s", "d"].includes(e.key)) {
                e.preventDefault(); // Prevent page scroll
            }
            
            if ((e.key === "ArrowUp" || e.key === "w") && velocityY !== 1) {
                velocityX = 0; velocityY = -1;
            } else if ((e.key === "ArrowDown" || e.key === "s") && velocityY !== -1) {
                velocityX = 0; velocityY = 1;
            } else if ((e.key === "ArrowLeft" || e.key === "a") && velocityX !== 1) {
                velocityX = -1; velocityY = 0;
            } else if ((e.key === "ArrowRight" || e.key === "d") && velocityX !== -1) {
                velocityX = 1; velocityY = 0;
            }
        });

        // Start game
        resetGame();
    </script>
</body>
</html>
