<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memory Match (จับคู่ความจำ)</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap');
        
        * {
            box-sizing: border-box;
            font-family: 'Kanit', sans-serif;
            margin: 0;
            padding: 0;
        }

        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #1e1b4b, #4338ca);
            color: white;
            overflow: hidden;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 0 4px 10px rgba(0,0,0,0.5);
            font-weight: 600;
        }

        .stats {
            display: flex;
            gap: 30px;
            margin-bottom: 20px;
            font-size: 1.2rem;
            background: rgba(255, 255, 255, 0.1);
            padding: 10px 20px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
        }

        .board {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            perspective: 1000px;
            padding: 20px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .card {
            width: 80px;
            height: 80px;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.5s;
            cursor: pointer;
        }

        .card.flipped {
            transform: rotateY(180deg);
        }

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }

        .card-front {
            background: linear-gradient(45deg, #8b5cf6, #ec4899);
            color: transparent;
            transform: rotateY(180deg);
            text-shadow: 0 0 0 white;
        }

        .card-back {
            background: linear-gradient(45deg, #3b82f6, #2dd4bf);
            border: 2px solid rgba(255,255,255,0.3);
        }
        
        .card-back::after {
            content: '?';
            font-size: 2.5rem;
            color: rgba(255,255,255,0.8);
            font-weight: bold;
        }

        button {
            margin-top: 30px;
            padding: 12px 30px;
            font-size: 1.2rem;
            font-weight: 600;
            background: #ec4899;
            color: white;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(236, 72, 153, 0.4);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(236, 72, 153, 0.6);
            background: #db2777;
        }

        @media (max-width: 500px) {
            .card { width: 60px; height: 60px; }
            .card-face { font-size: 2rem; }
            .board { gap: 10px; }
        }
    </style>

<style>/* global-responsive-fix */ canvas, #gameContainer { max-width: 100vw !important; max-height: 100vh !important; object-fit: contain !important; } body { overflow: hidden !important; touch-action: none; }</style>
</head>
<body>

    <h1>🧠 เกมจับคู่ความจำ</h1>
    <div class="stats">
        <div>จำนวนครั้ง: <span id="moves">0</span></div>
        <div>จับคู่สำเร็จ: <span id="matches">0</span> / 8</div>
    </div>

    <div class="board" id="board"></div>

    <button onclick="initGame()">เริ่มเกมใหม่</button>

    <script>
        const emojis = ['🚀', '🎸', '🎮', '🍕', '🏆', '👽', '💎', '🌈'];
        let cards = [];
        let hasFlippedCard = false;
        let lockBoard = false;
        let firstCard, secondCard;
        let moves = 0;
        let matches = 0;

        function initGame() {
            const board = document.getElementById('board');
            board.innerHTML = '';
            moves = 0;
            matches = 0;
            document.getElementById('moves').textContent = moves;
            document.getElementById('matches').textContent = matches;
            
            cards = [...emojis, ...emojis]
                .sort(() => Math.random() - 0.5);

            cards.forEach((emoji, index) => {
                const cardElement = document.createElement('div');
                cardElement.classList.add('card');
                cardElement.dataset.emoji = emoji;

                cardElement.innerHTML = `
                    <div class="card-face card-front">${emoji}</div>
                    <div class="card-face card-back"></div>
                `;

                cardElement.addEventListener('click', flipCard);
                board.appendChild(cardElement);
            });
        }

        function flipCard() {
            if (lockBoard) return;
            if (this === firstCard) return;

            this.classList.add('flipped');

            if (!hasFlippedCard) {
                hasFlippedCard = true;
                firstCard = this;
                return;
            }

            secondCard = this;
            moves++;
            document.getElementById('moves').textContent = moves;
            checkForMatch();
        }

        function checkForMatch() {
            let isMatch = firstCard.dataset.emoji === secondCard.dataset.emoji;

            if (isMatch) {
                disableCards();
                matches++;
                document.getElementById('matches').textContent = matches;
                if (matches === 8) {
                    const finalScore = Math.max(10, 1000 - (moves * 15));
                    setTimeout(() => {
                        alert('🎉 ยินดีด้วย! คุณชนะแล้ว! ใช้เวลาจับคู่ไป ' + moves + ' ครั้ง ได้คะแนน ' + finalScore);
                        window.parent.postMessage({ type: 'GAME_OVER', score: finalScore }, '*');
                    }, 500);
                }
            } else {
                unflipCards();
            }
        }

        function disableCards() {
            firstCard.removeEventListener('click', flipCard);
            secondCard.removeEventListener('click', flipCard);
            resetBoard();
        }

        function unflipCards() {
            lockBoard = true;
            setTimeout(() => {
                firstCard.classList.remove('flipped');
                secondCard.classList.remove('flipped');
                resetBoard();
            }, 1000);
        }

        function resetBoard() {
            [hasFlippedCard, lockBoard] = [false, false];
            [firstCard, secondCard] = [null, null];
        }

        initGame();
    </script>
</body>
</html>
