<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connect Four 2 Players</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0f0c2e;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      min-height: 100vh;
      font-family: 'Segoe UI', sans-serif;
      color: #fff; overflow: hidden;
    }
    #overlay {
      position: fixed; inset: 0;
      background: rgba(15,12,46,0.96);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      z-index: 20; gap: 12px;
    }
    #overlay h1 {
      font-size: 2.8rem; font-weight: 900;
      background: linear-gradient(135deg, #f59e0b, #ef4444);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    #overlay p { color: rgba(255,255,255,0.65); text-align: center; line-height: 1.7; font-size: 0.9rem; }
    .mode-btns { display: flex; gap: 14px; margin: 4px 0; }
    .mode-btn {
      background: rgba(255,255,255,0.05); border: 2px solid rgba(255,255,255,0.1);
      border-radius: 14px; padding: 14px 22px; cursor: pointer;
      text-align: center; transition: all 0.2s; min-width: 140px;
    }
    .mode-btn:hover { border-color: rgba(255,255,255,0.3); background: rgba(255,255,255,0.08); transform: translateY(-2px); }
    .mode-btn.selected { border-color: #f59e0b; background: rgba(245,158,11,0.12); }
    .mode-btn .icon { font-size: 1.8rem; margin-bottom: 5px; }
    .mode-btn .label { font-weight: 700; font-size: 0.95rem; }
    .mode-btn .sub { font-size: 0.72rem; color: rgba(255,255,255,0.45); margin-top: 2px; }
    .diff-row { display: flex; gap: 8px; align-items: center; }
    .diff-row span { font-size: 0.82rem; color: rgba(255,255,255,0.45); }
    .diff-btn {
      border: 2px solid rgba(255,255,255,0.14);
      border-radius: 50px; padding: 4px 16px;
      background: transparent; color: #fff;
      cursor: pointer; font-size: 0.82rem; transition: all 0.15s;
    }
    .diff-btn.selected { border-color: #34d399; background: rgba(52,211,153,0.15); color: #34d399; font-weight: 700; }
    .controls { display: flex; gap: 20px; }
    .player-box {
      background: rgba(255,255,255,0.05); border: 1.5px solid rgba(255,255,255,0.1);
      border-radius: 13px; padding: 10px 18px; text-align: center;
    }
    .player-box .name { font-size: 0.95rem; font-weight: 700; margin-bottom: 4px; }
    .player-box .keys { font-size: 0.78rem; color: rgba(255,255,255,0.5); }
    .key {
      display: inline-block; background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.18); border-radius: 4px;
      padding: 1px 6px; margin: 1px; font-family: monospace;
    }
    .start-btn {
      background: linear-gradient(135deg, #f59e0b, #ef4444);
      color: #fff; border: none; border-radius: 50px;
      padding: 12px 42px; font-size: 1rem; font-weight: 700;
      cursor: pointer; transition: all 0.2s;
      box-shadow: 0 8px 28px rgba(245,158,11,0.35);
    }
    .start-btn:hover { transform: translateY(-2px); }
    #game-container { display: flex; flex-direction: column; align-items: center; gap: 14px; }
    #turn-banner {
      font-size: 1.3rem; font-weight: 800;
      padding: 7px 28px; border-radius: 50px; transition: all 0.3s;
      min-width: 260px; text-align: center;
    }
    #bot-thinking {
      font-size: 0.85rem; color: rgba(255,255,255,0.4);
      height: 20px; text-align: center;
    }
    #board {
      background: #1e3a8a; border-radius: 16px; padding: 12px;
      box-shadow: 0 8px 60px rgba(30,58,138,0.6), 0 0 0 4px rgba(255,255,255,0.08);
      display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px;
    }
    .cell {
      width: 60px; height: 60px; background: #0f0c2e;
      border-radius: 50%; cursor: pointer; transition: all 0.12s;
      position: relative;
    }
    .cell:hover { background: #1a1650; }
    .cell.p1 { background: radial-gradient(circle at 35% 35%, #fbbf24, #f59e0b, #d97706); box-shadow: inset 0 -3px 5px rgba(0,0,0,0.3), 0 0 10px rgba(245,158,11,0.5); }
    .cell.p2 { background: radial-gradient(circle at 35% 35%, #f87171, #ef4444, #dc2626); box-shadow: inset 0 -3px 5px rgba(0,0,0,0.3), 0 0 10px rgba(239,68,68,0.5); }
    .cell.bot-piece { background: radial-gradient(circle at 35% 35%, #c084fc, #a855f7, #7c3aed); box-shadow: inset 0 -3px 5px rgba(0,0,0,0.3), 0 0 10px rgba(168,85,247,0.5); }
    .cell.win { animation: pulse-win 0.55s infinite alternate; }
    @keyframes pulse-win { from { filter: brightness(1); } to { filter: brightness(1.5) drop-shadow(0 0 12px white); } }
    .cell.hover-hint::after {
      content: '';
      position: absolute; inset: 4px;
      border-radius: 50%;
      background: rgba(255,255,255,0.1);
    }
    #col-indicators { display: grid; grid-template-columns: repeat(7,1fr); gap: 8px; padding: 0 12px; }
    .col-arrow {
      width: 60px; height: 22px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.1rem; opacity: 0; transition: opacity 0.12s; cursor: pointer;
    }
    .col-arrow.active { opacity: 1; }
  </style>

<style>/* global-responsive-fix */ canvas, #gameContainer { max-width: 100vw !important; max-height: 100vh !important; object-fit: contain !important; } body { overflow: hidden !important; touch-action: none; }</style>
</head>
<body>

<div id="overlay">
  <h1>🔴🟡 Connect Four</h1>
  <p>วางหมากต่อกัน 4 ตัวในแนวตั้ง แนวนอน หรือแนวทแยงเพื่อชนะ!</p>

  <div class="mode-btns">
    <div class="mode-btn selected" id="btn-2p" onclick="selectMode('2p')">
      <div class="icon">👥</div>
      <div class="label">2 ผู้เล่น</div>
      <div class="sub">ผลัดกันเดิน</div>
    </div>
    <div class="mode-btn" id="btn-bot" onclick="selectMode('bot')">
      <div class="icon">🤖</div>
      <div class="label">เล่นกับบอท</div>
      <div class="sub">AI Minimax</div>
    </div>
  </div>

  <div class="diff-row" id="diff-row" style="display:none">
    <span>ความยาก:</span>
    <button class="diff-btn selected" id="d-easy"   onclick="selectDiff('easy')">😊 ง่าย</button>
    <button class="diff-btn"          id="d-medium" onclick="selectDiff('medium')">🎯 ปานกลาง</button>
    <button class="diff-btn"          id="d-hard"   onclick="selectDiff('hard')">💀 ยาก</button>
  </div>

  <div class="controls">
    <div class="player-box">
      <div class="name" style="color:#fbbf24">🟡 ผู้เล่น 1</div>
      <div class="keys">คลิกคอลัมน์ หรือกด <span class="key">1</span>–<span class="key">7</span></div>
    </div>
    <div class="player-box" id="p2-hint">
      <div class="name" style="color:#f87171">🔴 ผู้เล่น 2</div>
      <div class="keys">คลิกคอลัมน์ หรือกด <span class="key">1</span>–<span class="key">7</span></div>
    </div>
  </div>

  <button class="start-btn" id="startBtn">▶ เริ่มเกม</button>
</div>

<div id="game-container">
  <div id="turn-banner"></div>
  <div id="bot-thinking"></div>
  <div id="col-indicators">
    <div class="col-arrow" id="arr0">▼</div>
    <div class="col-arrow" id="arr1">▼</div>
    <div class="col-arrow" id="arr2">▼</div>
    <div class="col-arrow" id="arr3">▼</div>
    <div class="col-arrow" id="arr4">▼</div>
    <div class="col-arrow" id="arr5">▼</div>
    <div class="col-arrow" id="arr6">▼</div>
  </div>
  <div id="board"></div>
</div>

<script>
const ROWS = 6, COLS = 7;
let board, currentPlayer, gameOver, gameMode = '2p', difficulty = 'easy', botMoves = 0;

const boardEl   = document.getElementById('board');
const turnBanner= document.getElementById('turn-banner');
const botThink  = document.getElementById('bot-thinking');
const overlay   = document.getElementById('overlay');

const P1_COLOR = '#fbbf24';
const P2_COLOR = '#f87171';
const BOT_COLOR= '#c084fc';

/* ─── Mode / Difficulty UI ─── */
function selectMode(m) {
  gameMode = m;
  document.getElementById('btn-2p').classList.toggle('selected', m === '2p');
  document.getElementById('btn-bot').classList.toggle('selected', m === 'bot');
  document.getElementById('diff-row').style.display = m === 'bot' ? 'flex' : 'none';
  const box = document.getElementById('p2-hint');
  if (m === 'bot') {
    box.innerHTML = `<div class="name" style="color:${BOT_COLOR}">🤖 บอท</div>
      <div class="keys">AI ระดับ ${difficulty === 'easy' ? '😊 ง่าย' : difficulty === 'medium' ? '🎯 ปานกลาง' : '💀 ยาก'}</div>`;
  } else {
    box.innerHTML = `<div class="name" style="color:${P2_COLOR}">🔴 ผู้เล่น 2</div>
      <div class="keys">คลิกคอลัมน์ หรือกด <span class="key">1</span>–<span class="key">7</span></div>`;
  }
}
function selectDiff(d) {
  difficulty = d;
  ['easy','medium','hard'].forEach(x => document.getElementById(`d-${x}`).classList.remove('selected'));
  document.getElementById(`d-${d}`).classList.add('selected');
  selectMode('bot');
}

/* ─── Rendering ─── */
function renderBoard() {
  boardEl.innerHTML = '';
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const cell = document.createElement('div');
      cell.className = 'cell';
      const v = board[r][c];
      if (v === 1) cell.classList.add('p1');
      else if (v === 2) {
        cell.classList.add(gameMode === 'bot' ? 'bot-piece' : 'p2');
      }
      cell.dataset.col = c;
      cell.addEventListener('click', () => handleDrop(parseInt(cell.dataset.col)));
      cell.addEventListener('mouseenter', () => highlightCol(parseInt(cell.dataset.col)));
      cell.addEventListener('mouseleave', clearArrows);
      boardEl.appendChild(cell);
    }
  }
}

function highlightCol(c) {
  if (gameOver || (gameMode === 'bot' && currentPlayer === 2)) return;
  clearArrows();
  const arr = document.getElementById(`arr${c}`);
  if (arr) { arr.classList.add('active'); arr.style.color = currentPlayer === 1 ? P1_COLOR : P2_COLOR; }
}
function clearArrows() {
  for (let i = 0; i < COLS; i++) {
    const a = document.getElementById(`arr${i}`);
    if (a) a.classList.remove('active');
  }
}

function updateTurnBanner() {
  const isBot = gameMode === 'bot' && currentPlayer === 2;
  if (currentPlayer === 1) {
    turnBanner.textContent = '🟡 ผู้เล่น 1 เดิน';
    turnBanner.style.cssText = `background:rgba(251,191,36,.15);border:2px solid rgba(251,191,36,.35);color:${P1_COLOR}`;
  } else if (isBot) {
    turnBanner.textContent = '🤖 บอทกำลังคิด…';
    turnBanner.style.cssText = `background:rgba(192,132,252,.15);border:2px solid rgba(192,132,252,.35);color:${BOT_COLOR}`;
  } else {
    turnBanner.textContent = '🔴 ผู้เล่น 2 เดิน';
    turnBanner.style.cssText = `background:rgba(248,113,113,.15);border:2px solid rgba(248,113,113,.35);color:${P2_COLOR}`;
  }
}

/* ─── Game Logic ─── */
function getAvailableRow(b, col) {
  for (let r = ROWS-1; r >= 0; r--) if (b[r][col] === 0) return r;
  return -1;
}

function handleDrop(col) {
  if (gameOver) return;
  if (gameMode === 'bot' && currentPlayer === 2) return; // bot's turn
  drop(col);
}

function drop(col) {
  const row = getAvailableRow(board, col);
  if (row === -1) return;
  board[row][col] = currentPlayer;
  renderBoard();
  const win = checkWin(board, row, col, currentPlayer);
  if (win) { highlightWin(win); endGame(currentPlayer); return; }
  if (board[0].every(c => c !== 0)) { drawGame(); return; }
  currentPlayer = currentPlayer === 1 ? 2 : 1;
  updateTurnBanner();
  if (gameMode === 'bot' && currentPlayer === 2) {
    botThink.textContent = '🤖 กำลังคิด…';
    setTimeout(botMove, difficulty === 'easy' ? 300 : difficulty === 'medium' ? 500 : 700);
  }
}

function botMove() {
  if (gameOver) return;
  let col;
  if (difficulty === 'easy') {
    col = botEasy();
  } else if (difficulty === 'medium') {
    col = botMedium();
  } else {
    col = bestMove(board, 7, 2);
  }
  botThink.textContent = '';
  drop(col);
}

/* Easy: random valid col */
function botEasy() {
  const valid = [];
  for (let c = 0; c < COLS; c++) if (getAvailableRow(board, c) !== -1) valid.push(c);
  // 30% chance to play smart (block/win)
  if (Math.random() < 0.3) return botMedium();
  return valid[Math.floor(Math.random() * valid.length)];
}

/* Medium: win if can, block if can, else center-biased random */
function botMedium() {
  // Check win
  for (let c = 0; c < COLS; c++) {
    const r = getAvailableRow(board, c);
    if (r === -1) continue;
    const b2 = cloneBoard(board); b2[r][c] = 2;
    if (checkWin(b2, r, c, 2)) return c;
  }
  // Block player 1
  for (let c = 0; c < COLS; c++) {
    const r = getAvailableRow(board, c);
    if (r === -1) continue;
    const b2 = cloneBoard(board); b2[r][c] = 1;
    if (checkWin(b2, r, c, 1)) return c;
  }
  // Center preference
  const order = [3,2,4,1,5,0,6];
  for (const c of order) if (getAvailableRow(board, c) !== -1) return c;
  return 0;
}

/* Hard: Minimax with alpha-beta */
function cloneBoard(b) { return b.map(r => [...r]); }

function scoreWindow(window, p) {
  const opp = p === 2 ? 1 : 2;
  const pc = window.filter(x => x === p).length;
  const ec = window.filter(x => x === 0).length;
  const oc = window.filter(x => x === opp).length;
  if (pc === 4) return 100;
  if (pc === 3 && ec === 1) return 5;
  if (pc === 2 && ec === 2) return 2;
  if (oc === 3 && ec === 1) return -4;
  return 0;
}

function scoreBoard(b, p) {
  let score = 0;
  // Center column bias
  const center = b.map(r => r[3]);
  score += center.filter(x => x === p).length * 3;
  // Horizontal
  for (let r = 0; r < ROWS; r++)
    for (let c = 0; c <= COLS-4; c++)
      score += scoreWindow([b[r][c],b[r][c+1],b[r][c+2],b[r][c+3]], p);
  // Vertical
  for (let c = 0; c < COLS; c++)
    for (let r = 0; r <= ROWS-4; r++)
      score += scoreWindow([b[r][c],b[r+1][c],b[r+2][c],b[r+3][c]], p);
  // Diagonal
  for (let r = 0; r <= ROWS-4; r++)
    for (let c = 0; c <= COLS-4; c++)
      score += scoreWindow([b[r][c],b[r+1][c+1],b[r+2][c+2],b[r+3][c+3]], p);
  for (let r = 3; r < ROWS; r++)
    for (let c = 0; c <= COLS-4; c++)
      score += scoreWindow([b[r][c],b[r-1][c+1],b[r-2][c+2],b[r-3][c+3]], p);
  return score;
}

function isTerminal(b) {
  for (let r = 0; r < ROWS; r++)
    for (let c = 0; c < COLS; c++) {
      if (b[r][c] !== 0 && checkWin(b, r, c, b[r][c])) return true;
    }
  return b[0].every(c => c !== 0);
}

function minimax(b, depth, alpha, beta, maximizing) {
  if (depth === 0 || isTerminal(b)) {
    if (isTerminal(b)) {
      for (let r = 0; r < ROWS; r++)
        for (let c = 0; c < COLS; c++)
          if (b[r][c] === 2 && checkWin(b,r,c,2)) return 1_000_000 + depth;
      for (let r = 0; r < ROWS; r++)
        for (let c = 0; c < COLS; c++)
          if (b[r][c] === 1 && checkWin(b,r,c,1)) return -1_000_000 - depth;
      return 0;
    }
    return scoreBoard(b, 2) - scoreBoard(b, 1);
  }
  const valid = [];
  for (let c = 0; c < COLS; c++) if (getAvailableRow(b,c) !== -1) valid.push(c);
  if (maximizing) {
    let best = -Infinity;
    for (const col of valid) {
      const r = getAvailableRow(b,col);
      const nb = cloneBoard(b); nb[r][col] = 2;
      best = Math.max(best, minimax(nb, depth-1, alpha, beta, false));
      alpha = Math.max(alpha, best);
      if (alpha >= beta) break;
    }
    return best;
  } else {
    let best = Infinity;
    for (const col of valid) {
      const r = getAvailableRow(b,col);
      const nb = cloneBoard(b); nb[r][col] = 1;
      best = Math.min(best, minimax(nb, depth-1, alpha, beta, true));
      beta = Math.min(beta, best);
      if (alpha >= beta) break;
    }
    return best;
  }
}

function bestMove(b, depth, p) {
  const valid = [];
  for (let c = 0; c < COLS; c++) if (getAvailableRow(b,c) !== -1) valid.push(c);
  let best = -Infinity, bestCol = valid[Math.floor(valid.length/2)];
  for (const col of valid) {
    const r = getAvailableRow(b,col);
    const nb = cloneBoard(b); nb[r][col] = 2;
    const score = minimax(nb, depth-1, -Infinity, Infinity, false);
    if (score > best) { best = score; bestCol = col; }
  }
  return bestCol;
}

/* ─── Win Check ─── */
function checkWin(b, row, col, p) {
  const dirs = [[0,1],[1,0],[1,1],[1,-1]];
  for (const [dr,dc] of dirs) {
    let cells = [[row,col]];
    for (let i = 1; i < 4; i++) {
      const r = row+dr*i, c = col+dc*i;
      if (r>=0&&r<ROWS&&c>=0&&c<COLS&&b[r][c]===p) cells.push([r,c]); else break;
    }
    for (let i = 1; i < 4; i++) {
      const r = row-dr*i, c = col-dc*i;
      if (r>=0&&r<ROWS&&c>=0&&c<COLS&&b[r][c]===p) cells.push([r,c]); else break;
    }
    if (cells.length >= 4) return cells;
  }
  return null;
}

function highlightWin(cells) {
  cells.forEach(([r,c]) => {
    const idx = r*COLS+c;
    boardEl.children[idx]?.classList.add('win');
  });
}

/* ─── End States ─── */
function endGame(winner) {
  gameOver = true;
  const isBot = gameMode === 'bot' && winner === 2;
  const winName = winner === 1 ? '🟡 ผู้เล่น 1' : (isBot ? '🤖 บอท' : '🔴 ผู้เล่น 2');
  const winColor = winner === 1 ? P1_COLOR : (isBot ? BOT_COLOR : P2_COLOR);
  setTimeout(() => {
    overlay.style.display = 'flex';
    overlay.innerHTML = `
      <h1 style="font-size:2.4rem;background:linear-gradient(135deg,${winColor},${winColor}88);-webkit-background-clip:text;-webkit-text-fill-color:transparent;">
        ${winName} ชนะ! 🎉
      </h1>
      <p style="font-size:1rem">ต่อ 4 ตัวสำเร็จ!</p>
      <button class="start-btn" onclick="location.reload()">🔄 เล่นอีกครั้ง</button>
    `;
    window.parent?.postMessage({ type: 'GAME_OVER', score: 100 }, '*');
  }, 600);
}

function drawGame() {
  gameOver = true;
  setTimeout(() => {
    overlay.style.display = 'flex';
    overlay.innerHTML = `
      <h1 style="font-size:2.4rem">🤝 เสมอกัน!</h1>
      <p>หมากเต็มกระดานโดยไม่มีใครชนะ</p>
      <button class="start-btn" onclick="location.reload()">🔄 เล่นอีกครั้ง</button>
    `;
  }, 400);
}

/* ─── Start ─── */
function startGame() {
  board = Array.from({length:ROWS}, () => Array(COLS).fill(0));
  currentPlayer = 1;
  gameOver = false;
  botThink.textContent = '';
  overlay.style.display = 'none';
  renderBoard();
  updateTurnBanner();
}

window.addEventListener('keydown', e => {
  const n = parseInt(e.key);
  if (!isNaN(n) && n >= 1 && n <= 7) handleDrop(n-1);
});

document.getElementById('startBtn').addEventListener('click', startGame);

// Init render
board = Array.from({length:ROWS}, () => Array(COLS).fill(0));
renderBoard();
</script>
</body>
</html>
